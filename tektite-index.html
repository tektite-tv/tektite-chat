<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theinternetisdead.org</title>

<style>
html,body{
background:black;
color:#00ff00;
font-family:"Courier New",monospace;
margin:0;
overflow:auto;
scrollbar-width:none;
-ms-overflow-style:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 20px;
background:rgba(75,0,118,.5);
}

.channelHeader{display:flex;align-items:center;gap:18px;}
.channelLogo{height:120px;}
.channelTitle{font-size:26px;font-weight:bold;}

.controls{display:flex;align-items:center;gap:12px;position:relative;}

#videoSearch{
width:360px;height:40px;
border:2px solid #00ff00;
background:black;color:#00ff00;
padding:0 12px;
font-family:"Courier New",monospace;
}

button{
height:40px;padding:0 16px;
border:2px solid #00ff00;
background:black;color:#00ff00;
cursor:pointer;
font-family:"Courier New",monospace;
}

button:hover{background:#001a00;}

#gridMenu{
position:absolute;
top:50px;
right:0;
background:black;
border:2px solid #00ff00;
padding:25px;
display:none;
}

#gridControl{
position:relative;
width:220px;
height:220px;
display:flex;
align-items:center;
justify-content:center;
}

#gridPreview{
display:grid;
grid-template-columns:repeat(10,16px);
grid-template-rows:repeat(10,16px);
gap:2px;
}

.gridCell{
width:16px;
height:16px;
border:1px solid purple;
background:transparent;
}

.gridCell.active{background:#00ff00;}

#widthSlider{
position:absolute;
bottom:-35px;
left:0;
width:180px;
}

#heightSlider{
position:absolute;
left:-35px;
top:0;
height:180px;
writing-mode:bt-lr;
transform:rotate(270deg);
}

#posts{padding:20px;}

.grid{display:grid;grid-template-columns:repeat(var(--cols,3),1fr);gap:20px;}

.list .post{
display:flex;
align-items:center;
gap:16px;
margin-bottom:16px;
border:2px solid #00ff00;
padding:10px;
}

.grid .post{
border:2px solid #00ff00;
padding:10px;
cursor:pointer;
}

.thumb-grid{
aspect-ratio:16/9;
overflow:hidden;
border:2px solid #00ff00;
margin-bottom:10px;
}

.thumb-grid img{width:100%;height:100%;object-fit:cover;}

.thumb-list{width:160px;border:2px solid #00ff00;}
.thumb-list img{width:100%;display:block;}

.post-title{font-size:16px;}
.post-date{font-size:12px;opacity:.7;}

#loadMore{
display:block;
margin:40px auto 60px auto;
padding:12px 30px;
font-size:18px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
cursor:pointer;
}

#lightbox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#lightbox iframe{
width:80vw;height:45vw;
max-height:80vh;
border:2px solid #00ff00;
}

#lightboxClose{
position:absolute;
top:20px;right:20px;
font-size:28px;
cursor:pointer;
}

.status{text-align:center;padding:10px;}
</style>
</head>

<body>

<header>

<div class="channelHeader">
<img src="/images/oldtube.png" class="channelLogo">
<div class="channelTitle">Honestly Thomas (Tektite)</div>
</div>

<div class="controls">
<input id="videoSearch" placeholder="Search Videos...">
<button id="listBtn">LIST</button>
<button id="gridBtn">GRID</button>

<div id="gridMenu">

<div id="gridControl">

<input type="range" min="1" max="10" value="3" id="widthSlider">
<input type="range" min="1" max="10" value="3" id="heightSlider">

<div id="gridPreview"></div>

</div>

</div>

</div>

</header>

<div id="posts" class="grid"></div>
<div id="status" class="status">LOADING YOUTUBE FEED...</div>

<button id="loadMore">Load More</button>

<div id="lightbox">
<div id="lightboxClose">✕</div>
<iframe id="lightboxFrame" src="" allowfullscreen></iframe>
</div>

<script>

const CHANNEL_ID="UCn3WLZT7k8nO24XimlJVJVQ";

const FEED="https://api.rss2json.com/v1/api.json?rss_url="+
encodeURIComponent("https://www.youtube.com/feeds/videos.xml?channel_id="+CHANNEL_ID);

let posts=[];
let filtered=[];
let view="grid";
let gridW=3;
let gridH=3;
let visible=gridW*gridH;

const postsEl=document.getElementById("posts");
const statusEl=document.getElementById("status");
const searchInput=document.getElementById("videoSearch");
const loadBtn=document.getElementById("loadMore");
const gridMenu=document.getElementById("gridMenu");
const gridBtn=document.getElementById("gridBtn");

const preview=document.getElementById("gridPreview");
const widthSlider=document.getElementById("widthSlider");
const heightSlider=document.getElementById("heightSlider");

const lightbox=document.getElementById("lightbox");
const frame=document.getElementById("lightboxFrame");

/* build preview grid */

for(let i=0;i<100;i++){
let c=document.createElement("div");
c.className="gridCell";
preview.appendChild(c);
}

function updatePreview(){
let cells=document.querySelectorAll(".gridCell");

cells.forEach((c,i)=>{
let x=i%10;
let y=Math.floor(i/10);

if(x<gridW && y<gridH) c.classList.add("active");
else c.classList.remove("active");
});
}

widthSlider.oninput=()=>{
gridW=parseInt(widthSlider.value);
visible=gridW*gridH;
updatePreview();
render();
}

heightSlider.oninput=()=>{
gridH=parseInt(heightSlider.value);
visible=gridW*gridH;
updatePreview();
render();
}

async function loadPosts(){
try{

const r=await fetch(FEED);
const j=await r.json();

posts=j.items.map(v=>({
title:v.title,
date:v.pubDate,
link:v.link,
thumb:v.thumbnail,
id:(v.link.match(/v=([^&]+)/)||[])[1]
}));

filtered=posts;

statusEl.style.display="none";
updatePreview();
render();

}catch(e){

console.error(e);
statusEl.textContent="FAILED TO LOAD FEED";

}
}

function openVideo(id){
frame.src="https://www.youtube.com/embed/"+id;
lightbox.style.display="flex";
}

document.getElementById("lightboxClose").onclick=()=>{
lightbox.style.display="none";
frame.src="";
}

function render(){
postsEl.className=view;
postsEl.style.gridTemplateColumns="repeat("+gridW+",1fr)";

postsEl.innerHTML="";

const data=filtered.slice(0,visible);

data.forEach(p=>{

const el=document.createElement("div");
el.className="post";

if(view==="grid"){

el.innerHTML=`
<div class="thumb-grid">
<img src="${p.thumb}">
</div>
<div class="post-title">${p.title}</div>`;

el.onclick=()=>openVideo(p.id);

}else{

el.innerHTML=`
<div class="thumb-list">
<img src="${p.thumb}">
</div>
<div>
<div class="post-title">${p.title}</div>
<div class="post-date">${new Date(p.date).toLocaleDateString()}</div>
</div>`;

el.querySelector("img").onclick=()=>openVideo(p.id);
el.querySelector(".post-title").onclick=()=>openVideo(p.id);

}

postsEl.appendChild(el);

});

if(visible>=filtered.length) loadBtn.style.display="none";
else loadBtn.style.display="block";
}

document.getElementById("listBtn").onclick=()=>{
view="list";
visible=3;
gridMenu.style.display="none";
render();
}

gridBtn.onclick=()=>{
if(view!=="grid"){
view="grid";
visible=gridW*gridH;
render();
}else{
gridMenu.style.display=gridMenu.style.display==="block"?"none":"block";
}
}

loadBtn.onclick=()=>{
if(view==="list") visible+=3;
else visible+=gridW*gridH;
render();
}

searchInput.addEventListener("input",()=>{
const q=searchInput.value.toLowerCase();
filtered=posts.filter(p=>p.title.toLowerCase().includes(q));
visible=view==="list"?3:gridW*gridH;
render();
});

document.addEventListener("DOMContentLoaded",loadPosts);

</script>

</body>
</html>
