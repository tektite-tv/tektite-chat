<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theinternetisdead.org</title>

<style>
body{
background:black;
color:#00ff00;
font-family:"Courier New",monospace;
margin:0;
}

/* SLIM HEADER WITHOUT SHRINKING LOGO */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 20px; /* slimmer bar */
background:rgba(75,0,118,.5);
box-sizing:border-box;
}

.channelHeader{
display:flex;
align-items:center;
gap:18px;
}

.channelLogo{
height:120px; /* ORIGINAL SIZE PRESERVED */
width:auto;
image-rendering:pixelated;
}

.channelTitle{
font-size:26px;
font-weight:bold;
color:#00ff00;
line-height:1.1;
}

.controls{
display:flex;
align-items:center;
gap:12px;
}

#videoSearch{
width:360px;
height:40px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
font-family:"Courier New",monospace;
padding:0 12px;
}

button{
height:40px;
padding:0 16px;
font-size:15px;
background:black;
color:#00ff00;
border:2px solid #00ff00;
font-family:"Courier New",monospace;
cursor:pointer;
}

button:hover{background:#001a00;}

/* VIDEO AREA */

#posts{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(var(--cols,3),1fr);
gap:20px;
}

.list .post{
margin-bottom:20px;
}

.post{
border:2px solid #00ff00;
padding:10px;
cursor:pointer;
}

.thumb-wrap{
aspect-ratio:16/9;
overflow:hidden;
border:2px solid #00ff00;
margin-bottom:10px;
}

.thumb-wrap img{width:100%;height:100%;object-fit:cover;}

.post-title{font-size:16px;margin-bottom:6px;}

.post-date{font-size:12px;opacity:.7;}

#loadMore{
display:block;
margin:30px auto;
}

.status{text-align:center;padding:10px;}

</style>
</head>

<body>

<header>

<div class="channelHeader">
<img src="/images/oldtube.png" class="channelLogo">
<div class="channelTitle">Honestly Thomas (Tektite)</div>
</div>

<div class="controls">
<input id="videoSearch" placeholder="Search Videos...">
<button id="listBtn">LIST</button>
<button id="gridBtn">GRID</button>
</div>

</header>

<div id="posts" class="list"></div>
<div id="status" class="status">LOADING YOUTUBE FEED...</div>

<button id="loadMore">Load More</button>

<script>

const CHANNEL_ID="UCn3WLZT7k8nO24XimlJVJVQ";

const FEED="https://api.rss2json.com/v1/api.json?rss_url="+
encodeURIComponent("https://www.youtube.com/feeds/videos.xml?channel_id="+CHANNEL_ID);

let posts=[];
let filtered=[];
let view="list";
let visible=3;
let cols=3;

const postsEl=document.getElementById("posts");
const statusEl=document.getElementById("status");
const searchInput=document.getElementById("videoSearch");

async function loadPosts(){

try{

const r=await fetch(FEED);
const j=await r.json();

posts=j.items.map(v=>({
title:v.title,
date:v.pubDate,
link:v.link,
videoId:(v.link.match(/v=([^&]+)/)||[])[1]||"",
thumb:v.thumbnail
}));

filtered=posts;

statusEl.style.display="none";
render();

}catch(e){

console.error(e);
statusEl.textContent="FAILED TO LOAD FEED";

}

}

function render(){

postsEl.className=view;
postsEl.innerHTML="";

const data=filtered.slice(0,visible);

data.forEach(p=>{

const el=document.createElement("div");
el.className="post";

el.innerHTML=`
<div class="thumb-wrap">
<img src="${p.thumb}">
</div>
<div class="post-title">${p.title}</div>
<div class="post-date">${new Date(p.date).toLocaleDateString()}</div>
`;

el.onclick=()=>window.open(p.link,"_blank");

postsEl.appendChild(el);

});

}

document.getElementById("listBtn").onclick=()=>{
view="list";
visible=3;
render();
};

document.getElementById("gridBtn").onclick=()=>{
view="grid";
cols=3;
visible=9;
document.documentElement.style.setProperty("--cols",cols);
render();
};

document.getElementById("loadMore").onclick=()=>{

if(view==="list") visible+=3;
else visible+=cols;

render();

};

searchInput.addEventListener("input",()=>{

const q=searchInput.value.toLowerCase();

filtered=posts.filter(p=>p.title.toLowerCase().includes(q));

visible=view==="list"?3:cols*cols;

render();

});

document.addEventListener("DOMContentLoaded",loadPosts);

</script>

</body>
</html>
