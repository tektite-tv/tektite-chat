<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theinternetisdead.org</title>

<style>

/* Hide scrollbars but keep scrolling */
html,body{
background:black;
color:#00ff00;
font-family:"Courier New",monospace;
margin:0;
overflow:auto;
scrollbar-width:none;
-ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
display:none;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 20px;
background:rgba(75,0,118,.5);
box-sizing:border-box;
}

.channelHeader{
display:flex;
align-items:center;
gap:18px;
}

.channelLogo{
height:120px;
width:auto;
image-rendering:pixelated;
}

.channelTitle{
font-size:26px;
font-weight:bold;
color:#00ff00;
line-height:1.1;
}

.controls{
display:flex;
align-items:center;
gap:12px;
}

#videoSearch{
width:360px;
height:40px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
font-family:"Courier New",monospace;
padding:0 12px;
}

button{
height:40px;
padding:0 16px;
font-size:15px;
background:black;
color:#00ff00;
border:2px solid #00ff00;
font-family:"Courier New",monospace;
cursor:pointer;
}

button:hover{background:#001a00;}

/* VIDEO AREA */

#posts{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.post{
border:2px solid #00ff00;
padding:10px;
cursor:pointer;
}

.thumb-wrap{
aspect-ratio:16/9;
overflow:hidden;
border:2px solid #00ff00;
margin-bottom:10px;
}

.thumb-wrap img{
width:100%;
height:100%;
object-fit:cover;
}

.post-title{
font-size:16px;
margin-bottom:6px;
}

.post-date{
font-size:12px;
opacity:.7;
}

#loadMore{
display:block;
margin:40px auto 60px auto;
padding:12px 30px;
font-size:18px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
cursor:pointer;
}

.status{
text-align:center;
padding:10px;
}

</style>
</head>

<body>

<header>

<div class="channelHeader">
<img src="/images/oldtube.png" class="channelLogo">
<div class="channelTitle">Honestly Thomas (Tektite)</div>
</div>

<div class="controls">
<input id="videoSearch" placeholder="Search Videos...">
<button id="listBtn">LIST</button>
<button id="gridBtn">GRID</button>
</div>

</header>

<div id="posts" class="grid"></div>
<div id="status" class="status">LOADING YOUTUBE FEED...</div>

<button id="loadMore">Load More</button>

<script>

const CHANNEL_ID="UCn3WLZT7k8nO24XimlJVJVQ";

const FEED="https://api.rss2json.com/v1/api.json?rss_url="+
encodeURIComponent("https://www.youtube.com/feeds/videos.xml?channel_id="+CHANNEL_ID);

let posts=[];
let filtered=[];
let view="grid";
let visible=9;

const postsEl=document.getElementById("posts");
const statusEl=document.getElementById("status");
const searchInput=document.getElementById("videoSearch");
const loadBtn=document.getElementById("loadMore");

async function loadPosts(){
try{

const r=await fetch(FEED);
const j=await r.json();

posts=j.items.map(v=>({
title:v.title,
date:v.pubDate,
link:v.link,
thumb:v.thumbnail
}));

filtered=posts;

statusEl.style.display="none";
render();

}catch(e){
console.error(e);
statusEl.textContent="FAILED TO LOAD FEED";
}
}

function render(){

postsEl.className=view;
postsEl.innerHTML="";

const data=filtered.slice(0,visible);

data.forEach(p=>{
const el=document.createElement("div");
el.className="post";

el.innerHTML=`
<div class="thumb-wrap">
<img src="${p.thumb}">
</div>
<div class="post-title">${p.title}</div>
<div class="post-date">${new Date(p.date).toLocaleDateString()}</div>
`;

el.onclick=()=>window.open(p.link,"_blank");

postsEl.appendChild(el);
});

/* hide load more if no more videos */
if(visible >= filtered.length) {
loadBtn.style.display="none";
} else {
loadBtn.style.display="block";
}

}

/* LIST VIEW */

document.getElementById("listBtn").onclick=()=>{
view="list";
visible=3;
render();
};

/* GRID VIEW */

document.getElementById("gridBtn").onclick=()=>{
view="grid";
visible=9;
render();
};

/* LOAD MORE */

loadBtn.onclick=()=>{

if(view==="list") {
visible += 3;
} else {
visible += 9; /* extend grid by 3x3 */
}

render();

};

/* SEARCH */

searchInput.addEventListener("input",()=>{

const q=searchInput.value.toLowerCase();

filtered=posts.filter(p=>p.title.toLowerCase().includes(q));

visible=view==="list" ? 3 : 9;

render();

});

document.addEventListener("DOMContentLoaded",loadPosts);

</script>

</body>
</html>
