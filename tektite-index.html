
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theinternetisdead.org</title>

<style>
html,body{
background:black;
color:#00ff00;
font-family:"Courier New",monospace;
margin:0;
overflow:auto;
scrollbar-width:none;
-ms-overflow-style:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 20px;
background:rgba(75,0,118,.5);
}

.channelHeader{display:flex;align-items:center;gap:18px;}
.channelLogo{height:120px;}
.channelTitle{font-size:26px;font-weight:bold;}

.controls{display:flex;align-items:center;gap:12px;position:relative;}

#videoSearch{
width:360px;height:40px;
border:2px solid #00ff00;
background:black;color:#00ff00;
padding:0 12px;
font-family:"Courier New",monospace;
}

button{
height:40px;padding:0 16px;
border:2px solid #00ff00;
background:black;color:#00ff00;
cursor:pointer;
font-family:"Courier New",monospace;
}

button:hover{background:#001a00;}

#posts{padding:20px;}

.grid{display:grid;grid-template-columns:repeat(var(--cols,3),1fr);gap:20px;}
.list .post{
display:flex;
align-items:center;
gap:16px;
margin-bottom:16px;
border:2px solid #00ff00;
padding:10px;
}

.grid .post{
border:2px solid #00ff00;
padding:10px;
cursor:pointer;
}

.thumb-grid{
aspect-ratio:16/9;
overflow:hidden;
border:2px solid #00ff00;
margin-bottom:10px;
}

.thumb-grid img{width:100%;height:100%;object-fit:cover;}
.thumb-list{width:160px;border:2px solid #00ff00;}
.thumb-list img{width:100%;display:block;}

.post-title{font-size:16px;}
.post-date{font-size:12px;opacity:.7;}

#loadMore{
display:block;
margin:40px auto 60px auto;
padding:12px 30px;
font-size:18px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
cursor:pointer;
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:flex-start;
z-index:99999;
}

#videoTitle{
padding-top:10px;
font-size:22px;
margin-bottom:10px;
text-align:center;
max-width:90vw;
}

#lightbox iframe{
width:min(48vw,640px);
aspect-ratio:16/9;
border:2px solid #00ff00;
}

#closeVideo{
font-size:20px;
cursor:pointer;
margin:12px 0;
}

.status{text-align:center;padding:10px;}
</style>
</head>

<body>

<header>

<div class="channelHeader">
<img src="/images/oldtube.png" class="channelLogo">
<div class="channelTitle">Honestly Thomas (Tektite)</div>
</div>

<div class="controls">
<input id="videoSearch" placeholder="Search Videos...">
<button id="listBtn">LIST</button>
<button id="gridBtn">GRID</button>
</div>

</header>

<div id="posts" class="grid"></div>
<div id="status" class="status">LOADING YOUTUBE FEED...</div>

<button id="loadMore">Load More</button>

<div id="lightbox">
<div id="videoTitle"></div>
<iframe id="lightboxFrame" src="" allowfullscreen></iframe>
<div id="closeVideo">[CLOSE VIDEO]</div>
</div>

<script>

const CHANNEL_ID="UCn3WLZT7k8nO24XimlJVJVQ";
const CACHE_KEY="yt_cache_videos";
const CACHE_TIME=1000*60*60*6;

const FEED="https://api.allorigins.win/get?url="+
encodeURIComponent("https://www.youtube.com/feeds/videos.xml?channel_id="+CHANNEL_ID);

let posts=[];
let filtered=[];
let visible=9;
let view="grid";

const postsEl=document.getElementById("posts");
const statusEl=document.getElementById("status");
const loadBtn=document.getElementById("loadMore");
const searchInput=document.getElementById("videoSearch");

async function loadPosts(){

let cached=localStorage.getItem(CACHE_KEY);

if(cached){
let obj=JSON.parse(cached);
if(Date.now()-obj.time<CACHE_TIME){
posts=obj.data;
filtered=posts;
statusEl.style.display="none";
render();
return;
}
}

try{

const r=await fetch(FEED);
const data=await r.json();

const xml=new DOMParser().parseFromString(data.contents,"text/xml");

posts=[...xml.querySelectorAll("entry")].map(e=>{

let link=e.querySelector("link").getAttribute("href");
let id=link.split("v=")[1];

return{
title:e.querySelector("title").textContent,
date:e.querySelector("published").textContent,
id:id,
thumb:`https://img.youtube.com/vi/${id}/hqdefault.jpg`
};

});

posts.sort((a,b)=>new Date(b.date)-new Date(a.date));

localStorage.setItem(CACHE_KEY,JSON.stringify({
time:Date.now(),
data:posts
}));

filtered=posts;

statusEl.style.display="none";
render();

}catch(e){

console.error(e);
statusEl.textContent="FAILED TO LOAD FEED";

}
}

function openVideo(id,title){

document.getElementById("lightboxFrame").src=
"https://www.youtube.com/embed/"+id;

document.getElementById("videoTitle").innerHTML=
'<a style="color:#00ff00;text-decoration:none;" target="_blank" href="https://youtube.com/watch?v='+id+'">'+title+'</a>';

document.getElementById("lightbox").style.display="flex";

}

document.getElementById("closeVideo").onclick=()=>{

document.getElementById("lightbox").style.display="none";
document.getElementById("lightboxFrame").src="";

};

function render(){

postsEl.className=view;
postsEl.innerHTML="";

filtered.slice(0,visible).forEach(p=>{

let el=document.createElement("div");
el.className="post";

if(view==="grid"){

el.innerHTML=`
<div class="thumb-grid">
<img src="${p.thumb}">
</div>
<div class="post-title">${p.title}</div>
`;

el.onclick=()=>openVideo(p.id,p.title);

}else{

el.innerHTML=`
<div class="thumb-list">
<img src="${p.thumb}">
</div>
<div>
<div class="post-title">${p.title}</div>
<div class="post-date">${new Date(p.date).toLocaleDateString()}</div>
</div>
`;

el.querySelector("img").onclick=()=>openVideo(p.id,p.title);
el.querySelector(".post-title").onclick=()=>openVideo(p.id,p.title);

}

postsEl.appendChild(el);

});

if(visible>=filtered.length) loadBtn.style.display="none";
else loadBtn.style.display="block";

}

document.getElementById("gridBtn").onclick=()=>{
view="grid";
visible=9;
render();
}

document.getElementById("listBtn").onclick=()=>{
view="list";
visible=6;
render();
}

loadBtn.onclick=()=>{
visible+=9;
render();
}

searchInput.addEventListener("input",()=>{

let q=searchInput.value.toLowerCase();

filtered=posts.filter(p=>p.title.toLowerCase().includes(q));

visible=9;

render();

});

document.addEventListener("DOMContentLoaded",loadPosts);

</script>

</body>
</html>
