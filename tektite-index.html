<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theinternetisdead.org</title>

<style>

html,body{
background:black;
color:#00ff00;
font-family:"Courier New",monospace;
margin:0;
overflow:auto;
scrollbar-width:none;
-ms-overflow-style:none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{display:none;}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 20px;
background:rgba(75,0,118,.5);
}

.channelHeader{display:flex;align-items:center;gap:18px;}

.channelLogo{height:120px;width:auto;}

.channelTitle{font-size:26px;font-weight:bold;}

.controls{display:flex;align-items:center;gap:12px;}

#videoSearch{
width:360px;
height:40px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
padding:0 12px;
font-family:"Courier New",monospace;
}

button{
height:40px;
padding:0 16px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
cursor:pointer;
font-family:"Courier New",monospace;
}

button:hover{background:#001a00;}

/* POSTS */

#posts{padding:20px;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.list .post{
display:flex;
align-items:center;
gap:16px;
margin-bottom:16px;
border:2px solid #00ff00;
padding:10px;
}

.grid .post{
border:2px solid #00ff00;
padding:10px;
cursor:pointer;
}

/* THUMBNAILS */

.thumb-grid{
aspect-ratio:16/9;
overflow:hidden;
border:2px solid #00ff00;
margin-bottom:10px;
}

.thumb-grid img{width:100%;height:100%;object-fit:cover;}

.thumb-list{
width:160px;
flex-shrink:0;
border:2px solid #00ff00;
}

.thumb-list img{width:100%;display:block;}

.post-title{font-size:16px;}

.post-date{font-size:12px;opacity:.7;}

/* LOAD MORE */

#loadMore{
display:block;
margin:40px auto 60px auto;
padding:12px 30px;
font-size:18px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
cursor:pointer;
}

/* LIGHTBOX */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#lightbox iframe{
width:80vw;
height:45vw;
max-height:80vh;
border:2px solid #00ff00;
}

#lightboxClose{
position:absolute;
top:20px;
right:20px;
font-size:28px;
cursor:pointer;
}

.status{text-align:center;padding:10px;}

</style>
</head>

<body>

<header>

<div class="channelHeader">
<img src="/images/oldtube.png" class="channelLogo">
<div class="channelTitle">Honestly Thomas (Tektite)</div>
</div>

<div class="controls">
<input id="videoSearch" placeholder="Search Videos...">
<button id="listBtn">LIST</button>
<button id="gridBtn">GRID</button>
</div>

</header>

<div id="posts" class="grid"></div>
<div id="status" class="status">LOADING YOUTUBE FEED...</div>

<button id="loadMore">Load More</button>

<div id="lightbox">
<div id="lightboxClose">✕</div>
<iframe id="lightboxFrame" src="" allowfullscreen></iframe>
</div>

<script>

const CHANNEL_ID="UCn3WLZT7k8nO24XimlJVJVQ";

const FEED="https://api.rss2json.com/v1/api.json?rss_url="+
encodeURIComponent("https://www.youtube.com/feeds/videos.xml?channel_id="+CHANNEL_ID);

let posts=[];
let filtered=[];
let view="grid";
let visible=9;

const postsEl=document.getElementById("posts");
const statusEl=document.getElementById("status");
const searchInput=document.getElementById("videoSearch");
const loadBtn=document.getElementById("loadMore");

const lightbox=document.getElementById("lightbox");
const frame=document.getElementById("lightboxFrame");

async function loadPosts(){
try{

const r=await fetch(FEED);
const j=await r.json();

posts=j.items.map(v=>({
title:v.title,
date:v.pubDate,
link:v.link,
thumb:v.thumbnail,
id:(v.link.match(/v=([^&]+)/)||[])[1]
}));

filtered=posts;

statusEl.style.display="none";
render();

}catch(e){

console.error(e);
statusEl.textContent="FAILED TO LOAD FEED";

}
}

function openVideo(id){
frame.src="https://www.youtube.com/embed/"+id;
lightbox.style.display="flex";
}

document.getElementById("lightboxClose").onclick=()=>{
lightbox.style.display="none";
frame.src="";
};

function render(){
postsEl.className=view;
postsEl.innerHTML="";

const data=filtered.slice(0,visible);

data.forEach(p=>{

const el=document.createElement("div");
el.className="post";

if(view==="grid"){
el.innerHTML=`
<div class="thumb-grid">
<img src="${p.thumb}">
</div>
<div class="post-title">${p.title}</div>
`;

el.onclick=()=>openVideo(p.id);

}else{

el.innerHTML=`
<div class="thumb-list">
<img src="${p.thumb}">
</div>
<div>
<div class="post-title">${p.title}</div>
<div class="post-date">${new Date(p.date).toLocaleDateString()}</div>
</div>
`;

el.querySelector("img").onclick=()=>openVideo(p.id);
el.querySelector(".post-title").onclick=()=>openVideo(p.id);

}

postsEl.appendChild(el);

});

if(visible>=filtered.length) loadBtn.style.display="none";
else loadBtn.style.display="block";

}

document.getElementById("listBtn").onclick=()=>{
view="list";
visible=3;
render();
};

document.getElementById("gridBtn").onclick=()=>{
view="grid";
visible=9;
render();
};

loadBtn.onclick=()=>{

if(view==="list") visible+=3;
else visible+=9;

render();

};

searchInput.addEventListener("input",()=>{

const q=searchInput.value.toLowerCase();

filtered=posts.filter(p=>p.title.toLowerCase().includes(q));

visible=view==="list"?3:9;

render();

});

document.addEventListener("DOMContentLoaded",loadPosts);

</script>

</body>
</html>
