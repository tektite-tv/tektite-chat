<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ensure RSS feed loads */
  if (typeof loadPosts === "function") {
    loadPosts();
  }

  const searchInput = document.getElementById("videoSearch");

  function clearSearch(){
    document.body.classList.remove("search-active");
    document.querySelectorAll(".post").forEach(p=>{
      p.classList.remove("dimmed","highlight");
    });
  }

  if(searchInput){

    searchInput.addEventListener("input",()=>{

      const q = searchInput.value.toLowerCase().trim();
      const posts = document.querySelectorAll(".post");

      if(q===""){
        clearSearch();
        return;
      }

      document.body.classList.add("search-active");

      posts.forEach(post=>{
        const text = post.innerText.toLowerCase();

        if(text.includes(q)){
          post.classList.remove("dimmed");
          post.classList.add("highlight");
        }else{
          post.classList.remove("highlight");
          post.classList.add("dimmed");
        }
      });

    });

  }

  document.addEventListener("click",(e)=>{
    if(searchInput && !searchInput.contains(e.target)){
      searchInput.value="";
      clearSearch();
    }
  });

});
</script>


<script>

let currentCols = 3;
let visibleListCount = 9;

const loadBtn = document.getElementById("loadMore");
const postsContainer = document.getElementById("posts");

function updateLoadButton(totalPosts, viewMode){
    if(viewMode === "grid"){
        if(currentCols >= 10 || currentCols*currentCols >= totalPosts){
            loadBtn.textContent = "Show Less";
        }else{
            loadBtn.textContent = "Load More";
        }
    }else{
        if(visibleListCount >= totalPosts){
            loadBtn.textContent = "Show Less";
        }else{
            loadBtn.textContent = "Load More";
        }
    }
}

function handleLoadMore(){

    const viewMode = postsContainer.classList.contains("list") ? "list" : "grid";
    const posts = document.querySelectorAll(".post");
    const total = posts.length;

    if(loadBtn.textContent === "Show Less"){
        currentCols = 3;
        visibleListCount = 9;
        document.documentElement.style.setProperty("--cols", currentCols);
        renderPosts && renderPosts();
        loadBtn.textContent = "Load More";
        return;
    }

    if(viewMode === "grid"){
        if(currentCols < 10){
            currentCols++;
            document.documentElement.style.setProperty("--cols", currentCols);
            renderPosts && renderPosts();
        }
    }else{
        visibleListCount += 3;
        renderPosts && renderPosts();
    }

    updateLoadButton(total, viewMode);
}

if(loadBtn){
    loadBtn.style.display = "block";
    loadBtn.addEventListener("click", handleLoadMore);
}

</script>
