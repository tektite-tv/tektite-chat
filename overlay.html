<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
html,body{
margin:0;
padding:0;
font-family:monospace;
background:transparent;
overflow:hidden;
}

body.sidebar-open{
overflow:hidden;
}

.topbar{
height:76px;
background:#3b0066;
display:flex;
align-items:center;
padding:0 16px;
box-sizing:border-box;
}

.hamburger{
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
user-select:none;
color:lime;
line-height:1;
flex:0 0 auto;
}

.logo{
margin-left:14px;
display:flex;
align-items:center;
min-width:0;
}

.logo a{display:flex;align-items:center;}
.logo img{height:46px;width:auto;display:block;}
.spacer{flex:1;}
.clock{display:flex;align-items:center;justify-content:flex-end;flex:0 0 auto;}
.clock-box{display:flex;align-items:center;justify-content:center;}
.clock-box iframe{border:0;width:240px;height:40px;}

.sidebar{
position:fixed;
top:0;
left:-320px;
width:320px;
max-width:92vw;
height:100dvh;
background:#110019;
transition:left .25s ease;
box-shadow:2px 0 10px rgba(0,0,0,.6);
display:flex;
flex-direction:column;
z-index:9999;
}
.sidebar.open{left:0;}
.sidebar-menu{padding:20px;flex:1;overflow:hidden;}
.sidebar-item{margin-bottom:12px;}
.sidebar-item a{
display:block;
background:#3b0066;
color:lime;
text-decoration:none;
border:2px solid lime;
box-shadow:
0 0 6px rgba(0,255,0,.55),
0 0 12px rgba(0,255,0,.22),
inset 0 0 6px rgba(0,255,0,.16);
transition:box-shadow .18s ease,transform .18s ease,background .18s ease;
overflow:hidden;
font-weight:bold;
text-align:center;
padding:10px;
}
.sidebar-preview{
width:100%;
aspect-ratio:16/9;
overflow:hidden;
max-height:0;
opacity:0;
transition:max-height .25s ease,opacity .25s ease;
background:black;
margin-top:10px;
}
.sidebar-preview img{width:100%;height:100dvh;object-fit:cover;display:block;transition:transform .2s ease;}
.sidebar-item:hover img{transform:scale(1.05);}
.sidebar-item:hover .sidebar-preview{max-height:200px;opacity:1;}
.sidebar-item a:hover{
background:#4b0082;
box-shadow:
0 0 10px rgba(0,255,0,.8),
0 0 20px rgba(0,255,0,.35),
inset 0 0 10px rgba(0,255,0,.22);
transform:translateY(-1px);
}
.sidebar-bottom{padding:0 20px 20px;}

@media (max-width: 768px){
.topbar{
height:112px;
flex-wrap:wrap;
align-content:flex-start;
padding:10px 14px 8px;
}
.hamburger{
width:48px;
height:48px;
font-size:34px;
}
.logo{
margin-left:10px;
flex:1 1 calc(100% - 58px);
justify-content:center;
}
.logo img{
height:58px;
max-width:min(78vw, 430px);
object-fit:contain;
}
.spacer{
flex:0 0 0;
width:0;
}
.clock{
flex:0 0 100%;
justify-content:center;
margin-top:2px;
}
.clock-box iframe{
width:220px;
height:32px;
}
.sidebar{
left:-100vw;
width:100vw;
max-width:100vw;
height:100dvh;
overflow-y:auto;
overflow-x:hidden;
-webkit-overflow-scrolling:touch;
}
.sidebar.open{left:0;}
.sidebar .topbar{
height:84px;
padding:10px 14px;
flex:0 0 auto;
}
.sidebar .logo{
justify-content:flex-start;
}
.sidebar .logo img{height:42px;max-width:70vw;}
.sidebar-menu{padding:16px;overflow:visible;flex:1 0 auto;}
.sidebar-item a{font-size:18px;padding:14px 10px;}
.sidebar-preview,
.sidebar-item:hover .sidebar-preview{max-height:none;opacity:1;}
}
</style>
</head>
<body>
<div class="topbar">
<div class="hamburger" onclick="toggleSidebar()">☰</div>
<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png" alt="The Internet Is Dead">
</a>
</div>
<div class="spacer"></div>
<div class="clock">
<div class="clock-box">
<iframe src="https://free.timeanddate.com/clock/iabiy632/n250/fn8/fs30/fc0f0/tct/pct/ftb/th2" frameborder="0"></iframe>
</div>
</div>
</div>

<div id="sidebar" class="sidebar">
<div class="topbar">
<div class="hamburger" onclick="toggleSidebar()">✕</div>
<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png" alt="The Internet Is Dead">
</a>
</div>
</div>
<div class="sidebar-menu">
<div class="sidebar-item"><a href="/tektite-photosphere.html">Tektite's Photosphere<div class="sidebar-preview"><img src="/images/link-thumbnails/tektite-photosphere.png"></div></a></div>
<div class="sidebar-item"><a href="/tektite-image-editor.html">Tektite's Image Editor<div class="sidebar-preview"><img src="/images/link-thumbnails/tektite-image-editor.png"></div></a></div>
<div class="sidebar-item"><a href="/tektite-sound-machine.html">Tektite's Sound Machine<div class="sidebar-preview"><img src="/images/link-thumbnails/tektite-sound-machine.png"></div></a></div>
<div class="sidebar-item"><a href="/tektite-explorer.html">Tektite's File Explorer<div class="sidebar-preview"><img src="/images/link-thumbnails/tektite-file-browser.png"></div></a></div>
</div>
<div class="sidebar-bottom">
<div class="sidebar-item"><a href="/tektite-chat.html">Tektite's Chat<div class="sidebar-preview"><img src="/images/link-thumbnails/tektite-chat.png"></div></a></div>
</div>
</div>
<script>
function toggleSidebar(){
  const sidebar = document.getElementById("sidebar");
  const open = sidebar.classList.toggle("open");
  document.body.classList.toggle("sidebar-open", open);
}
function openStats(){
  window.parent.postMessage({type:"openStats"}, "*");
}
</script>
</body>
</html>
