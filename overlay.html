<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

.topbar{
    height:60px;
    background:#3b0066;
    display:flex;
    align-items:center;
    padding-left:15px;
}

.hamburger{
    font-size:26px;
    cursor:pointer;
    user-select:none;
    color:lime;
    font-weight:bold;
}

.logo{
    margin-left:15px;
    height:40px;
}

.logo img{
    height:100%;
    width:auto;
    display:block;
}

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:#1a1a1a;
    transition:left 0.25s;
    box-shadow:2px 0 10px rgba(0,0,0,0.6);
}

.sidebar.open{
    left:0;
}

.sidebar-menu{
    padding:20px;
}

.sidebar-menu a{
    display:block;
    background:lime;
    color:black;
    text-decoration:none;
    border:2px solid black;
    padding:10px;
    margin-bottom:12px;
    text-align:center;
    font-weight:bold;
}


.motd{
    margin-left:20px;
    font-family:monospace;
    color:lime;
    font-size:14px;
    white-space:nowrap;
    filter:hue-rotate(0deg);
    animation:hueShift 6s linear infinite;
}

@keyframes hueShift{
    from{ filter:hue-rotate(0deg); }
    to{ filter:hue-rotate(360deg); }
}

</style>
</head>

<body>

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

<div id="motd" class="motd">loading...</div>

</div>

<div id="sidebar" class="sidebar">

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">✕</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

</div>

<div class="sidebar-menu">

<a href="/tektite-photosphere.html">Tektite's Photosphere</a>
<a href="/tektite-image-editor.html">Tektite's Image Editor</a>

</div>

</div>


<script>

function toggleSidebar(){
    const sidebar = document.getElementById('sidebar');
    if(sidebar){ sidebar.classList.toggle('open'); }
}

async function loadMOTD(){
    try{
        const res = await fetch('https://theinternetisdead.org/motd.json');
        const data = await res.json();
        if(Array.isArray(data) && data.length>0){
            const msg = data[Math.floor(Math.random()*data.length)];
            document.getElementById('motd').textContent = msg;
        }else{
            document.getElementById('motd').textContent = '...';
        }
    }catch(e){
        document.getElementById('motd').textContent = '';
    }
}

loadMOTD();
</script>

</body>
</html>
