<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:monospace;
}

/* TOP BAR */

.topbar{
min-height:60px;
background:#3b0066;
display:flex;
align-items:center;
padding:10px 15px;
box-sizing:border-box;
}

/* HAMBURGER */

.hamburger{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
color:lime;
}

/* LOGO */

.logo{
margin-left:15px;
display:flex;
align-items:center;
}

.logo img{
height:40px;
}

.spacer{
flex:1;
}

/* CLOCK */

.clock{
display:flex;
align-items:center;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#1a1a1a;
transition:left .25s;
display:flex;
flex-direction:column;
}

.sidebar.open{
left:0;
}

.sidebar-menu{
padding:20px;
flex:1;
}

.sidebar-item{
margin-bottom:12px;
}

.sidebar-item a{
display:block;
background:#3b0066;
color:lime;
text-decoration:none;
border:2px solid black;
font-weight:bold;
text-align:center;
padding:10px;
}

.sidebar-preview{
width:100%;
aspect-ratio:16/9;
overflow:hidden;
max-height:0;
opacity:0;
transition:max-height .25s ease,opacity .25s ease;
background:black;
margin-top:10px;
}

.sidebar-item:hover .sidebar-preview{
max-height:200px;
opacity:1;
}

.sidebar-preview img{
width:100%;
height:100%;
object-fit:cover;
}

/* MOBILE */

@media (max-width:900px){

.topbar{
min-height:72px;
}

.logo img{
height:36px;
}

.clock iframe{
width:150px;
height:32px;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

<div class="spacer"></div>

<div class="clock">
<iframe src="https://free.timeanddate.com/clock/iabiy632/n250/fn8/fs30/fc0f0/tct/pct/ftb/th2"
frameborder="0"
width="200"
height="36"></iframe>
</div>

</div>

<div id="sidebar" class="sidebar">

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">✕</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

</div>

<div class="sidebar-menu">

<div class="sidebar-item">
<a href="/tektite-photosphere.html">
Tektite's Photosphere
<div class="sidebar-preview">
<img src="/images/link-thumbnails/tektite-photosphere.png">
</div>
</a>
</div>

<div class="sidebar-item">
<a href="/tektite-image-editor.html">
Tektite's Image Editor
<div class="sidebar-preview">
<img src="/images/link-thumbnails/tektite-image-editor.png">
</div>
</a>
</div>

<div class="sidebar-item">
<a href="/tektite-sound-machine.html">
Tektite's Sound Machine
<div class="sidebar-preview">
<img src="/images/link-thumbnails/tektite-sound-machine.png">
</div>
</a>
</div>

</div>

</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
