<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:monospace;
}

/* TOP BAR */

.topbar{
height:60px;
background:#3b0066;
display:flex;
align-items:center;
justify-content:space-between;
padding-left:15px;
padding-right:15px;
position:relative;
}

/* HAMBURGER */

.hamburger{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
user-select:none;
color:lime;
line-height:1;
transform:translateY(-2px);
transition:box-shadow .15s ease, background .15s ease, transform .15s ease;
}

.hamburger:hover{
background:rgba(0,255,0,0.5);
box-shadow:0 0 0 2px lime,0 0 10px lime,0 0 20px lime;
transform:translateY(-2px) scale(1.1);
}

/* LOGO */

.logo{
margin-left:15px;
height:60px;
display:flex;
align-items:center;
}

.logo img{
height:40px;
}

/* CLOCK CENTERED */

.clock{
position:absolute;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#1a1a1a;
transition:left .25s;
box-shadow:2px 0 10px rgba(0,0,0,.6);
display:flex;
flex-direction:column;
}

.sidebar.open{
left:0;
}

.sidebar-menu{
padding:20px;
flex:1;
}

.sidebar-item{
margin-bottom:12px;
}

.sidebar-item a{
display:block;
background:#3b0066;
color:lime;
text-decoration:none;
border:2px solid black;
font-weight:bold;
text-align:center;
padding:10px;
}

/* MOBILE */

@media (max-width:700px){

.topbar{
height:52px;
padding-left:10px;
padding-right:10px;
}

.logo img{
height:32px;
}

.clock iframe{
width:150px;
height:28px;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="clock">
<iframe src="https://free.timeanddate.com/clock/iabiy632/n250/fn8/fs30/fc0f0/tct/pct/ftb/th2"
frameborder="0"
width="200"
height="36"></iframe>
</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

</div>

<div id="sidebar" class="sidebar">

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">✕</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

</div>

<div class="sidebar-menu">

<div class="sidebar-item">
<a href="/tektite-photosphere.html">Tektite's Photosphere</a>
</div>

<div class="sidebar-item">
<a href="/tektite-image-editor.html">Tektite's Image Editor</a>
</div>

<div class="sidebar-item">
<a href="/tektite-sound-machine.html">Tektite's Sound Machine</a>
</div>

</div>

</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

</script>

</body>
</html>
