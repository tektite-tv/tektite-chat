<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

html,body{
    margin:0;
    padding:0;
    background:#3b0066;
    font-family:"Courier New", monospace;
}

/* top bar */
.topbar{
    height:60px;
    width:100%;
    background:#3b0066;
    display:flex;
    align-items:center;
    padding-left:15px;
    box-sizing:border-box;
}

/* hamburger */
.hamburger{
    font-size:26px;
    cursor:pointer;
    user-select:none;
    color:lime;
    font-weight:bold;
}

/* logo */
.logo{
    margin-left:15px;
    height:40px;
    display:flex;
    align-items:center;
}

.logo img{
    height:100%;
    width:auto;
    display:block;
}

/* MOTD */
.motd{
    margin-left:20px;
    font-family:monospace;
    color:lime;
    font-size:14px;
    white-space:nowrap;
    filter:hue-rotate(0deg);
    animation:hueShift 6s linear infinite;
}

@keyframes hueShift{
    from{ filter:hue-rotate(0deg); }
    to{ filter:hue-rotate(360deg); }
}

/* sidebar */
.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100vh;
    background:#1a1a1a;
    transition:left 0.25s;
    box-shadow:2px 0 10px rgba(0,0,0,0.6);
    z-index:2000;
}

.sidebar.open{
    left:0;
}

.sidebar-menu{
    padding:20px;
}

.sidebar-menu a{
    display:block;
    background:lime;
    color:black;
    text-decoration:none;
    border:2px solid black;
    padding:10px;
    margin-bottom:12px;
    text-align:center;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

<div id="motd" class="motd">loading...</div>

</div>

<div id="sidebar" class="sidebar">

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">✕</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

</div>

<div class="sidebar-menu">
<a href="/tektite-photosphere.html">Tektite's Photosphere</a>
<a href="/tektite-image-editor.html">Tektite's Image Editor</a>
</div>

</div>

<script>

function toggleSidebar(){
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('open');
}

async function loadMOTD(){
    try{
        const res = await fetch('/motd.json');
        const data = await res.json();

        if(Array.isArray(data) && data.length){
            const msg = data[Math.floor(Math.random()*data.length)];
            document.getElementById('motd').textContent = msg;
        }
    }catch(e){
        document.getElementById('motd').textContent = '';
    }
}

loadMOTD();

</script>

</body>
</html>
