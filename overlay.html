<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>overlay</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 60px;
    overflow: hidden;
    background: #3b0066;
    font-family: "Courier New", monospace;
}

* {
    box-sizing: border-box;
}

.topbar {
    width: 100%;
    height: 60px;
    min-height: 60px;
    max-height: 60px;
    background: #3b0066;
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 0 15px;
    overflow: hidden;
}

.hamburger {
    flex: 0 0 auto;
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    user-select: none;
    color: lime;
    font-weight: bold;
}

.logo {
    flex: 0 0 auto;
    height: 40px;
    display: flex;
    align-items: center;
    overflow: hidden;
}

.logo a {
    display: flex;
    align-items: center;
    height: 40px;
    overflow: hidden;
}

.logo img {
    display: block;
    height: 40px;
    max-height: 40px;
    width: auto;
}

.motd {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: lime;
    font-size: 14px;
    filter: hue-rotate(0deg);
    animation: hueShift 6s linear infinite;
    text-align: right;
}

@keyframes hueShift {
    from { filter: hue-rotate(0deg); }
    to { filter: hue-rotate(360deg); }
}

.sidebar {
    position: fixed;
    top: 0;
    left: -260px;
    width: 260px;
    height: 100vh;
    background: #1a1a1a;
    transition: left 0.25s;
    box-shadow: 2px 0 10px rgba(0,0,0,0.6);
    z-index: 9999;
    overflow-y: auto;
}

.sidebar.open {
    left: 0;
}

.sidebar .topbar {
    position: sticky;
    top: 0;
    z-index: 1;
}

.sidebar-menu {
    padding: 20px;
}

.sidebar-menu a {
    display: block;
    background: lime;
    color: black;
    text-decoration: none;
    border: 2px solid black;
    padding: 10px;
    margin-bottom: 12px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>

    <div class="logo">
        <a href="/">
            <img src="/images/deadlogo-green.png" alt="The Internet Is Dead">
        </a>
    </div>

    <div id="motd" class="motd">loading...</div>
</div>

<div id="sidebar" class="sidebar">
    <div class="topbar">
        <div class="hamburger" onclick="toggleSidebar()">✕</div>

        <div class="logo">
            <a href="/">
                <img src="/images/deadlogo-green.png" alt="The Internet Is Dead">
            </a>
        </div>
    </div>

    <div class="sidebar-menu">
        <a href="/tektite-photosphere.html">Tektite's Photosphere</a>
        <a href="/tektite-image-editor.html">Tektite's Image Editor</a>
    </div>
</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    if (sidebar) sidebar.classList.toggle("open");
}

async function loadMOTD() {
    const motd = document.getElementById("motd");
    if (!motd) return;

    try {
        const res = await fetch("/motd.json", { cache: "no-store" });
        const data = await res.json();

        if (Array.isArray(data) && data.length > 0) {
            motd.textContent = data[Math.floor(Math.random() * data.length)];
        } else {
            motd.textContent = "";
        }
    } catch (e) {
        motd.textContent = "";
    }
}

loadMOTD();
</script>

</body>
</html>
