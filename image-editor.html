<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite Image Editor</title>

<style>
html,body{
margin:0;
padding:12px 0 0 0;
background:#111;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
}

#startPanel{display:flex;gap:20px;margin-top:20px;}

#uploadBox,#cameraBox{
width:260px;height:260px;
display:flex;align-items:center;justify-content:center;
cursor:pointer;text-align:center;
}

#uploadBox{border:3px dashed #777;}
#cameraBox{border:3px dashed red;background:rgba(255,0,0,0.4);}

#editor{display:none;flex-direction:column;align-items:center;width:100%;}

#imageWindow{
background:#000;border:1px solid #444;
display:flex;flex-direction:column;
max-width:92vw;max-height:75vh;position:relative;
}

#windowBar{
height:32px;background:#4b0076;
display:flex;align-items:center;padding:0 10px;
font-family:monospace;color:#00ff66;
}

#leftControls{display:flex;gap:8px;align-items:center;}

#modeSelector{
background:#000;color:#00ff66;border:1px solid #333;
font-family:monospace;height:22px;
}

#gear{cursor:pointer;font-size:18px;width:24px;text-align:center;display:none;}

canvas{max-width:92vw;max-height:65vh;display:block;}

#controlsPanel{
position:absolute;top:34px;left:0;
background:#000;border:1px solid #333;
padding:10px;display:none;z-index:10;
font-family:monospace;
}

select,input{
background:#000;color:#00ff66;border:1px solid #333;font-family:monospace;
}

#compareSlider{width:100%;margin-top:8px;display:none;}

#actions{
font-family:"Courier New", monospace;color:#00ff66;
margin-top:24px;padding-bottom:28px;
}

#actions span{cursor:pointer;padding:6px 12px;}
</style>
</head>

<body>

<div id="startPanel">
<div id="uploadBox">Upload Image</div>
<div id="cameraBox">Enable Camera</div>
</div>

<input type="file" id="fileInput" hidden>

<div id="editor">
  <div id="imageWindow">
    <div id="windowBar">
      <div id="leftControls">
        <select id="modeSelector">
          <option value="">Select Mode</option>
          <option value="comparator">Comparator</option>
          <option value="mirror">Mirror</option>
        </select>
        <div id="gear">⚙️</div>
      </div>
    </div>

    <div id="controlsPanel">

      <div id="comparatorControls" style="display:none">
        <b>Comparator Controls</b><br><br>

        Left Effect<br>
        <select id="leftEffect">
          <option value="original">Original</option>
          <option value="chromatic">Chromatic Aberration</option>
          <option value="anaglyph">Anaglyph</option>
          <option value="grayscale">Grayscale</option>
          <option value="invert">Invert</option>
          <option value="blur">Blur</option>
        </select><br><br>

        Right Effect<br>
        <select id="rightEffect">
          <option value="original">Original</option>
          <option value="chromatic">Chromatic Aberration</option>
          <option value="anaglyph">Anaglyph</option>
          <option value="grayscale">Grayscale</option>
          <option value="invert">Invert</option>
          <option value="blur">Blur</option>
        </select>
      </div>

      <div id="mirrorControls" style="display:none">
        <b>Mirror Controls</b><br><br>

        Mirror Axis<br>
        <select id="mirrorAxis">
          <option value="vertical">Vertical</option>
          <option value="horizontal">Horizontal</option>
          <option value="both">Both (4×)</option>
        </select><br><br>

        <label>
          <input type="checkbox" id="mirrorInvert">
          Invert Halves
        </label>
      </div>

    </div>

    <canvas id="canvas"></canvas>
    <input type="range" id="compareSlider" min="0" max="100" value="50">
  </div>

  <div id="actions">
    <span id="saveBtn">[Save]</span>
    <span id="closeBtn">[CLOSE]</span>
  </div>
</div>

<script>

const uploadBox=document.getElementById("uploadBox");
const cameraBox=document.getElementById("cameraBox");
const startPanel=document.getElementById("startPanel");
const fileInput=document.getElementById("fileInput");
const editor=document.getElementById("editor");

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const modeSelector=document.getElementById("modeSelector");
const gear=document.getElementById("gear");
const controlsPanel=document.getElementById("controlsPanel");
const compareSlider=document.getElementById("compareSlider");

const comparatorControls=document.getElementById("comparatorControls");
const mirrorControls=document.getElementById("mirrorControls");

const mirrorAxis=document.getElementById("mirrorAxis");
const mirrorInvert=document.getElementById("mirrorInvert");

let sourceType="image";
let original=new Image();
let video=null;
let videoStream=null;
let rafId=null;

function currentSource(){
return sourceType==="video"?video:original;
}

function drawSource(){
const src=currentSource();
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(src,0,0,canvas.width,canvas.height);
}

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=r=>{
original.onload=()=>{
sourceType="image";
canvas.width=original.width;
canvas.height=original.height;
startPanel.style.display="none";
editor.style.display="flex";
drawCurrentMode();
};
original.src=r.target.result;
};
reader.readAsDataURL(file);
};

cameraBox.onclick=async()=>{

videoStream=await navigator.mediaDevices.getUserMedia({video:true});

video=document.createElement("video");
video.srcObject=videoStream;
video.autoplay=true;
video.muted=true;
video.playsInline=true;

await video.play();

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

sourceType="video";
startPanel.style.display="none";
editor.style.display="flex";

renderLoop();
};

function renderLoop(){
drawCurrentMode();
requestAnimationFrame(renderLoop);
}

function quad(src,sx,sy,sw,sh,dx,dy,dw,dh,flipX,flipY){

ctx.save();

ctx.translate(dx+(flipX?dw:0),dy+(flipY?dh:0));
ctx.scale(flipX?-1:1,flipY?-1:1);

ctx.drawImage(src,sx,sy,sw,sh,0,0,dw,dh);

ctx.restore();
}

function renderMirror(){

const src=currentSource();

const w=canvas.width;
const h=canvas.height;
const hw=w/2;
const hh=h/2;

ctx.clearRect(0,0,w,h);

if(mirrorAxis.value==="both"){

if(!mirrorInvert.checked){

quad(src,0,0,hw,hh,0,0,hw,hh,false,false); // TL
quad(src,0,0,hw,hh,hw,0,hw,hh,true,false); // TR

quad(src,0,0,hw,hh,0,hh,hw,hh,false,true); // BL
quad(src,0,0,hw,hh,hw,hh,hw,hh,true,true); // BR

}else{

quad(src,0,0,hw,hh,0,0,hw,hh,false,true); // TL flipY
quad(src,0,0,hw,hh,hw,0,hw,hh,true,true); // TR flipXY

quad(src,0,0,hw,hh,0,hh,hw,hh,false,false); // BL
quad(src,0,0,hw,hh,hw,hh,hw,hh,true,false); // BR

}

return;
}

if(mirrorAxis.value==="vertical"){

if(!mirrorInvert.checked){
quad(src,0,0,hw,h,0,0,hw,h,false,false);
quad(src,0,0,hw,h,hw,0,hw,h,true,false);
}else{
quad(src,0,0,hw,h,0,0,hw,h,true,false);
quad(src,0,0,hw,h,hw,0,hw,h,false,false);
}

}

if(mirrorAxis.value==="horizontal"){

if(!mirrorInvert.checked){
quad(src,0,0,w,hh,0,0,w,hh,false,false);
quad(src,0,0,w,hh,0,hh,w,hh,false,true);
}else{
quad(src,0,0,w,hh,0,0,w,hh,false,true);
quad(src,0,0,w,hh,0,hh,w,hh,false,false);
}

}

}

function drawCurrentMode(){

if(modeSelector.value==="mirror"){
renderMirror();
}else{
drawSource();
}

}

modeSelector.onchange=()=>{

controlsPanel.style.display="none";
gear.style.display="none";
mirrorControls.style.display="none";

if(modeSelector.value==="mirror"){
gear.style.display="block";
mirrorControls.style.display="block";
}

drawCurrentMode();
};

gear.onclick=()=>{
controlsPanel.style.display=controlsPanel.style.display==="block"?"none":"block";
};

mirrorAxis.onchange=drawCurrentMode;
mirrorInvert.onchange=drawCurrentMode;

</script>

</body>
</html>
