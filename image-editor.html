<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite Image Editor</title>

<style>

html,body{
margin:0;
padding:0;
background:#111;
color:white;
font-family:sans-serif;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

#startPanel{
display:flex;
gap:20px;
}

/* UPLOAD */

#uploadBox{
width:280px;
height:280px;
border:3px dashed #777;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
text-align:center;
}

/* CAMERA */

#cameraBox{
width:280px;
height:280px;
border:3px dashed red;
background:rgba(255,0,0,0.5);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
text-align:center;
}

/* EDITOR */

#editor{
display:none;
flex-direction:column;
align-items:center;
}

#imageWindow{
background:#000;
border:1px solid #444;
display:flex;
flex-direction:column;
max-width:95vw;
position:relative;
}

#windowBar{
height:32px;
background:#4b0076;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-family:monospace;
color:#00ff66;
}

#leftControls{
display:flex;
gap:8px;
align-items:center;
}

#modeSelector{
background:#000;
color:#00ff66;
border:1px solid #333;
font-family:monospace;
height:22px;
}

#gear{
cursor:pointer;
font-size:18px;
width:24px;
text-align:center;
display:none;
}

#filename{
opacity:.85;
}

canvas{
max-width:92vw;
max-height:60vh;
display:block;
}

#controlsPanel{
position:absolute;
top:34px;
left:0;
background:#000;
border:1px solid #333;
padding:10px;
display:none;
z-index:10;
font-family:monospace;
}

select{
background:#000;
color:#00ff66;
border:1px solid #333;
font-family:monospace;
}

#dividerLine{
position:absolute;
top:34px;
bottom:-30px;
width:5px;
background:rgba(255,255,255,0);
left:50%;
z-index:6;
pointer-events:none;
display:none;
}

#dividerHandle{
width:28px;
height:28px;
border-radius:50%;
background:#4b0076;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
cursor:ew-resize;
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
z-index:8;
display:none;
}

#dividerHandle::after{
content:"↔";
font-size:14px;
color:white;
}

#actions{
font-family:"Courier New", monospace;
color:#00ff66;
margin-top:60px;
}

#actions span{
cursor:pointer;
padding:6px 12px;
}

</style>
</head>

<body>

<div id="startPanel">
<div id="uploadBox">Drop Image<br>or Click</div>
<div id="cameraBox">Enable Camera</div>
</div>

<input type="file" id="fileInput" hidden>

<div id="editor">

<div id="imageWindow">

<div id="windowBar">

<div id="leftControls">
<select id="modeSelector">
<option value="">Select Mode</option>
<option value="comparator">Comparator</option>
</select>
<div id="gear">⚙️</div>
</div>

<div id="filename"></div>

</div>

<div id="controlsPanel">

<div><b>Comparator Controls</b></div>

<div style="margin-top:8px">Left Effect</div>
<select id="leftEffect">
<option value="original">Original</option>
<option value="chromatic">Chromatic</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
</select>

<div style="margin-top:8px">Right Effect</div>
<select id="rightEffect">
<option value="original">Original</option>
<option value="chromatic">Chromatic</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
</select>

</div>

<div id="dividerLine"></div>
<div id="dividerHandle"></div>

<canvas id="canvas"></canvas>

</div>

<div id="actions">
<span id="saveBtn">[Save]</span>
<span id="closeBtn">[CLOSE]</span>
</div>

</div>

<script>

const uploadBox=document.getElementById("uploadBox")
const cameraBox=document.getElementById("cameraBox")
const startPanel=document.getElementById("startPanel")
const fileInput=document.getElementById("fileInput")
const editor=document.getElementById("editor")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const filenameLabel=document.getElementById("filename")

const dividerLine=document.getElementById("dividerLine")
const dividerHandle=document.getElementById("dividerHandle")

const modeSelector=document.getElementById("modeSelector")
const gear=document.getElementById("gear")
const controlsPanel=document.getElementById("controlsPanel")

const leftEffect=document.getElementById("leftEffect")
const rightEffect=document.getElementById("rightEffect")

const saveBtn=document.getElementById("saveBtn")
const closeBtn=document.getElementById("closeBtn")

let original=new Image()
let videoStream=null
let video=null

let leftCanvas=document.createElement("canvas")
let rightCanvas=document.createElement("canvas")

let leftCtx=leftCanvas.getContext("2d")
let rightCtx=rightCanvas.getContext("2d")

let split=0.5
let dragging=false

uploadBox.onclick=()=>fileInput.click()

uploadBox.ondragover=e=>e.preventDefault()

uploadBox.ondrop=e=>{
e.preventDefault()
loadFile(e.dataTransfer.files[0])
}

fileInput.onchange=e=>{
loadFile(e.target.files[0])
}

function loadFile(file){

const reader=new FileReader()

reader.onload=e=>{

original.onload=()=>{

canvas.width=original.width
canvas.height=original.height

filenameLabel.textContent=file.name

startPanel.style.display="none"
editor.style.display="flex"

drawOriginal()

}

original.src=e.target.result

}

reader.readAsDataURL(file)

}

/* CAMERA */

cameraBox.onclick=async ()=>{

videoStream=await navigator.mediaDevices.getUserMedia({video:true})

video=document.createElement("video")
video.srcObject=videoStream
video.play()

video.onloadedmetadata=()=>{

canvas.width=video.videoWidth
canvas.height=video.videoHeight

startPanel.style.display="none"
editor.style.display="flex"

requestAnimationFrame(drawCamera)

}

}

function drawCamera(){

ctx.drawImage(video,0,0,canvas.width,canvas.height)
requestAnimationFrame(drawCamera)

}

function drawOriginal(){

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(original,0,0)

dividerLine.style.display="none"
dividerHandle.style.display="none"

}

gear.onclick=()=>{
controlsPanel.style.display = controlsPanel.style.display==="block" ? "none":"block"
}

modeSelector.onchange=()=>{

if(modeSelector.value==="comparator"){

gear.style.display="block"

dividerLine.style.display="block"
dividerHandle.style.display="flex"

generateComparator()

}else{

gear.style.display="none"
controlsPanel.style.display="none"
drawOriginal()

}

}

leftEffect.onchange=generateComparator
rightEffect.onchange=generateComparator

function generateComparator(){

applyEffect(leftEffect.value,leftCtx)
applyEffect(rightEffect.value,rightCtx)

renderSplit()
updateDivider()

}

function renderSplit(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(rightCanvas,0,0)

ctx.save()
ctx.beginPath()
ctx.rect(0,0,canvas.width*split,canvas.height)
ctx.clip()
ctx.drawImage(leftCanvas,0,0)
ctx.restore()

}

function updateDivider(){

const rect=canvas.getBoundingClientRect()
const pos=rect.width*split

dividerLine.style.left=pos+"px"
dividerHandle.style.left=pos+"px"

}

dividerHandle.addEventListener("mousedown",()=>{
dragging=true
})

document.addEventListener("mouseup",()=>{
dragging=false
})

document.addEventListener("mousemove",(e)=>{

if(!dragging) return

const rect=canvas.getBoundingClientRect()

split=(e.clientX-rect.left)/rect.width
split=Math.max(0,Math.min(1,split))

updateDivider()
renderSplit()

})

saveBtn.onclick=()=>{

const link=document.createElement("a")
link.download="edited-image.png"
link.href=canvas.toDataURL()
link.click()

}

closeBtn.onclick=()=>{

editor.style.display="none"
startPanel.style.display="flex"

ctx.clearRect(0,0,canvas.width,canvas.height)

if(videoStream){
videoStream.getTracks().forEach(t=>t.stop())
videoStream=null
}

modeSelector.value=""
gear.style.display="none"
controlsPanel.style.display="none"

}

function applyEffect(type,targetCtx){

const w=canvas.width
const h=canvas.height

targetCtx.drawImage(canvas,0,0)

let imgData=targetCtx.getImageData(0,0,w,h)
let d=imgData.data

if(type==="invert"){
for(let i=0;i<d.length;i+=4){
d[i]=255-d[i]
d[i+1]=255-d[i+1]
d[i+2]=255-d[i+2]
}
}

if(type==="grayscale"){
for(let i=0;i<d.length;i+=4){
let v=(d[i]+d[i+1]+d[i+2])/3
d[i]=d[i+1]=d[i+2]=v
}
}

if(type==="anaglyph"){
for(let i=0;i<d.length;i+=4){
d[i+1]=0
}
}

if(type==="chromatic"){

let copy=new Uint8ClampedArray(d)

let offsetR=12
let offsetB=-12

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let i=(y*w+x)*4

let xr=Math.min(w-1,Math.max(0,x+offsetR))
let xb=Math.min(w-1,Math.max(0,x+offsetB))

let ir=(y*w+xr)*4
let ib=(y*w+xb)*4

d[i]=copy[ir]
d[i+2]=copy[ib+2]

}
}
}

targetCtx.putImageData(imgData,0,0)

}

</script>

</body>
</html>
