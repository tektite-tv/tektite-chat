<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite Image Editor</title>

<style>
html,body{
margin:0;
padding:12px 0 0 0;
background:#111;
color:white;
font-family:sans-serif;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
}

/* START PANEL */
#startPanel{
display:flex;
gap:20px;
margin-top:20px;
}

/* BUTTON BOXES */
#uploadBox,#cameraBox{
width:260px;
height:260px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
text-align:center;
}

#uploadBox{
border:3px dashed #777;
}

#cameraBox{
border:3px dashed red;
background:rgba(255,0,0,0.5);
}

/* EDITOR */
#editor{
display:none;
flex-direction:column;
align-items:center;
width:100%;
}

/* WINDOW */
#imageWindow{
background:#000;
border:1px solid #444;
display:flex;
flex-direction:column;
max-width:92vw;
max-height:75vh;
position:relative;
}

/* WINDOW BAR */
#windowBar{
height:32px;
background:#4b0076;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-family:monospace;
color:#00ff66;
}

#leftControls{
display:flex;
gap:8px;
align-items:center;
}

#modeSelector{
background:#000;
color:#00ff66;
border:1px solid #333;
font-family:monospace;
height:22px;
}

#gear{
cursor:pointer;
font-size:18px;
width:24px;
text-align:center;
display:none;
}

/* CANVAS */
canvas{
max-width:92vw;
max-height:65vh;
display:block;
}

/* CONTROL PANEL */
#controlsPanel{
position:absolute;
top:34px;
left:0;
background:#000;
border:1px solid #333;
padding:10px;
display:none;
z-index:10;
font-family:monospace;
}

select,input{
background:#000;
color:#00ff66;
border:1px solid #333;
font-family:monospace;
}

/* DIVIDER */
#dividerLine{
position:absolute;
top:34px;
bottom:-30px;
width:5px;
background:rgba(255,255,255,0);
left:50%;
z-index:6;
pointer-events:none;
display:none;
}

#dividerHandle{
width:28px;
height:28px;
border-radius:50%;
background:#4b0076;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
cursor:ew-resize;
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
z-index:8;
display:none;
}

#dividerHandle::after{
content:"↔";
font-size:14px;
color:white;
}

/* ACTIONS */
#actions{
font-family:"Courier New", monospace;
color:#00ff66;
margin-top:40px;
padding-bottom:40px;
}

#actions span{
cursor:pointer;
padding:6px 12px;
}
</style>
</head>

<body>

<div id="startPanel">
<div id="uploadBox">Drop Image<br>or Click</div>
<div id="cameraBox">Enable Camera</div>
</div>

<input type="file" id="fileInput" hidden>

<div id="editor">

<div id="imageWindow">

<div id="windowBar">
<div id="leftControls">
<select id="modeSelector">
<option value="">Select Mode</option>
<option value="comparator">Comparator</option>
<option value="mirror">Mirror</option>
</select>
<div id="gear">⚙️</div>
</div>
</div>

<div id="controlsPanel">

<div id="comparatorControls">
<b>Comparator Controls</b><br><br>

Left Effect<br>
<select id="leftEffect">
<option value="original">Original</option>
<option value="chromatic">Chromatic</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
</select><br><br>

Right Effect<br>
<select id="rightEffect">
<option value="original">Original</option>
<option value="chromatic">Chromatic</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
</select>

</div>

<div id="mirrorControls" style="display:none">

<b>Mirror Controls</b><br><br>

Mirror Source<br>
<select id="mirrorSource">
<option value="left">Left → Right</option>
<option value="right">Right → Left</option>
</select><br><br>

Flip Type<br>
<select id="mirrorFlip">
<option value="horizontal">Horizontal</option>
<option value="vertical">Vertical</option>
</select><br><br>

Feather<br>
<input type="range" id="mirrorFeather" min="0" max="100" value="0">

</div>

</div>

<div id="dividerLine"></div>
<div id="dividerHandle"></div>

<canvas id="canvas"></canvas>

</div>

<div id="actions">
<span id="saveBtn">[Save]</span>
<span id="closeBtn">[CLOSE]</span>
</div>

</div>

<script>

const uploadBox=document.getElementById("uploadBox")
const cameraBox=document.getElementById("cameraBox")
const startPanel=document.getElementById("startPanel")
const fileInput=document.getElementById("fileInput")
const editor=document.getElementById("editor")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const dividerLine=document.getElementById("dividerLine")
const dividerHandle=document.getElementById("dividerHandle")

const modeSelector=document.getElementById("modeSelector")
const gear=document.getElementById("gear")
const controlsPanel=document.getElementById("controlsPanel")

const leftEffect=document.getElementById("leftEffect")
const rightEffect=document.getElementById("rightEffect")

const mirrorSource=document.getElementById("mirrorSource")
const mirrorFlip=document.getElementById("mirrorFlip")

let sourceType="image"
let original=new Image()
let video=null
let videoStream=null

let leftCanvas=document.createElement("canvas")
let rightCanvas=document.createElement("canvas")

let leftCtx=leftCanvas.getContext("2d")
let rightCtx=rightCanvas.getContext("2d")

let split=0.5
let dragging=false

/* UPLOAD */
uploadBox.onclick=()=>fileInput.click()

fileInput.onchange=e=>{
loadFile(e.target.files[0])
}

function loadFile(file){

const reader=new FileReader()

reader.onload=e=>{

original.onload=()=>{

sourceType="image"

canvas.width=original.width
canvas.height=original.height

leftCanvas.width=canvas.width
rightCanvas.width=canvas.width
leftCanvas.height=canvas.height
rightCanvas.height=canvas.height

startPanel.style.display="none"
editor.style.display="flex"

drawSource()

}

original.src=e.target.result

}

reader.readAsDataURL(file)

}

/* CAMERA */
cameraBox.onclick=async ()=>{

videoStream=await navigator.mediaDevices.getUserMedia({
video:{width:{ideal:4096},height:{ideal:2160}}
})

video=document.createElement("video")
video.srcObject=videoStream
video.play()

video.onloadedmetadata=()=>{

sourceType="video"

canvas.width=video.videoWidth
canvas.height=video.videoHeight

leftCanvas.width=canvas.width
rightCanvas.width=canvas.width
leftCanvas.height=canvas.height
rightCanvas.height=canvas.height

startPanel.style.display="none"
editor.style.display="flex"

requestAnimationFrame(loop)

}

}

/* SOURCE DRAW */
function drawSource(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(sourceType==="image"){
ctx.drawImage(original,0,0)
}else{
ctx.drawImage(video,0,0)
}

}

/* LOOP */
function loop(){

if(sourceType==="video"){

if(modeSelector.value==="comparator"){
generateComparator()
}
else if(modeSelector.value==="mirror"){
renderMirror()
}
else{
drawSource()
}

requestAnimationFrame(loop)

}

}

/* MODE SWITCH */
modeSelector.onchange=()=>{

dividerLine.style.display="none"
dividerHandle.style.display="none"

document.getElementById("comparatorControls").style.display="none"
document.getElementById("mirrorControls").style.display="none"

if(modeSelector.value==="comparator"){

gear.style.display="block"
dividerLine.style.display="block"
dividerHandle.style.display="flex"

document.getElementById("comparatorControls").style.display="block"

generateComparator()

}

else if(modeSelector.value==="mirror"){

gear.style.display="block"
dividerLine.style.display="block"
dividerHandle.style.display="flex"

document.getElementById("mirrorControls").style.display="block"

renderMirror()

}

else{

gear.style.display="none"
controlsPanel.style.display="none"
drawSource()

}

}

gear.onclick=()=>{
controlsPanel.style.display =
controlsPanel.style.display==="block"?"none":"block"
}

/* COMPARATOR */
leftEffect.onchange=generateComparator
rightEffect.onchange=generateComparator

function generateComparator(){

let source = sourceType==="video" ? video : original

leftCtx.drawImage(source,0,0,canvas.width,canvas.height)
rightCtx.drawImage(source,0,0,canvas.width,canvas.height)

applyEffect(leftEffect.value,leftCtx)
applyEffect(rightEffect.value,rightCtx)

renderSplit()
updateDivider()

}

function renderSplit(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(rightCanvas,0,0)

ctx.save()
ctx.beginPath()
ctx.rect(0,0,canvas.width*split,canvas.height)
ctx.clip()
ctx.drawImage(leftCanvas,0,0)
ctx.restore()

}

/* MIRROR MODE */
function renderMirror(){

let source = sourceType==="video" ? video : original

ctx.clearRect(0,0,canvas.width,canvas.height)

let axis = canvas.width * split

ctx.drawImage(source,0,0)

ctx.save()

if(mirrorFlip.value==="horizontal"){

ctx.translate(axis*2,0)
ctx.scale(-1,1)

}

else{

ctx.translate(0,canvas.height*2)
ctx.scale(1,-1)

}

ctx.drawImage(source,0,0)

ctx.restore()

}

/* SLIDER */
function updateDivider(){

const rect=canvas.getBoundingClientRect()
const pos=rect.width*split

dividerLine.style.left=pos+"px"
dividerHandle.style.left=pos+"px"

}

dividerHandle.addEventListener("mousedown",()=>{
dragging=true
})

document.addEventListener("mouseup",()=>{
dragging=false
})

document.addEventListener("mousemove",(e)=>{

if(!dragging) return

const rect=canvas.getBoundingClientRect()

split=(e.clientX-rect.left)/rect.width
split=Math.max(0,Math.min(1,split))

if(modeSelector.value==="mirror"){
renderMirror()
}
else{
renderSplit()
}

updateDivider()

})

/* EFFECT ENGINE */
function applyEffect(type,targetCtx){

const w=canvas.width
const h=canvas.height

let imgData=targetCtx.getImageData(0,0,w,h)
let d=imgData.data

if(type==="invert"){
for(let i=0;i<d.length;i+=4){
d[i]=255-d[i]
d[i+1]=255-d[i+1]
d[i+2]=255-d[i+2]
}
}

if(type==="grayscale"){
for(let i=0;i<d.length;i+=4){
let v=(d[i]+d[i+1]+d[i+2])/3
d[i]=d[i+1]=d[i+2]=v
}
}

if(type==="anaglyph"){
for(let i=0;i<d.length;i+=4){
d[i+1]=0
}
}

if(type==="chromatic"){

let copy=new Uint8ClampedArray(d)

let offsetR=12
let offsetB=-12

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let i=(y*w+x)*4

let xr=Math.min(w-1,Math.max(0,x+offsetR))
let xb=Math.min(w-1,Math.max(0,x+offsetB))

let ir=(y*w+xr)*4
let ib=(y*w+xb)*4

d[i]=copy[ir]
d[i+2]=copy[ib+2]

}
}
}

targetCtx.putImageData(imgData,0,0)

}
</script>

</body>
</html>
