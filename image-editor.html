
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite Image Editor</title>
<style>
html,body{margin:0;padding:12px 0 0 0;background:#111;color:white;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;}
#startPanel{display:flex;gap:20px;margin-top:20px;}
#uploadBox,#cameraBox{width:260px;height:260px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-align:center;}
#uploadBox{border:3px dashed #777;}
#cameraBox{border:3px dashed red;background:rgba(255,0,0,0.4);}
#editor{display:none;flex-direction:column;align-items:center;width:100%;}
#imageWindow{background:#000;border:1px solid #444;display:flex;flex-direction:column;max-width:92vw;max-height:75vh;position:relative;}
#windowBar{height:32px;background:#4b0076;display:flex;align-items:center;padding:0 10px;font-family:monospace;color:#00ff66;}
#leftControls{display:flex;gap:8px;align-items:center;}
#modeSelector{background:#000;color:#00ff66;border:1px solid #333;font-family:monospace;height:22px;}
#gear{cursor:pointer;font-size:18px;width:24px;text-align:center;display:none;}
canvas{max-width:92vw;max-height:65vh;display:block;}
#controlsPanel{position:absolute;top:34px;left:0;background:#000;border:1px solid #333;padding:10px;display:none;z-index:10;font-family:monospace;}
select,input{background:#000;color:#00ff66;border:1px solid #333;font-family:monospace;}
#compareSlider{width:100%;display:none;}
</style>
</head>
<body>

<div id="startPanel">
<div id="uploadBox">Upload Image</div>
<div id="cameraBox">Enable Camera</div>
</div>

<input type="file" id="fileInput" hidden>

<div id="editor">
<div id="imageWindow">

<div id="windowBar">
<div id="leftControls">
<select id="modeSelector">
<option value="">Select Mode</option>
<option value="comparator">Comparator</option>
<option value="mirror">Mirror</option>
</select>
<div id="gear">⚙️</div>
</div>
</div>

<div id="controlsPanel">

<div id="mirrorControls" style="display:none">
Mirror Axis<br>
<select id="mirrorAxis">
<option value="vertical">Vertical</option>
<option value="horizontal">Horizontal</option>
<option value="both">Both (4×)</option>
</select><br><br>

<label>
<input type="checkbox" id="mirrorInvert">
Invert Halves
</label>
</div>

<div id="compareControls" style="display:none">
Left Effect<br>
<select id="leftEffect">
<option value="none">None</option>
<option value="chromatic">Chromatic Aberration</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
<option value="blur">Blur</option>
</select><br><br>

Right Effect<br>
<select id="rightEffect">
<option value="none">None</option>
<option value="chromatic">Chromatic Aberration</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
<option value="blur">Blur</option>
</select>
</div>

</div>

<canvas id="canvas"></canvas>
<input type="range" id="compareSlider" min="0" max="100" value="50">

</div>
</div>

<script>

const uploadBox=document.getElementById("uploadBox");
const cameraBox=document.getElementById("cameraBox");
const fileInput=document.getElementById("fileInput");
const startPanel=document.getElementById("startPanel");
const editor=document.getElementById("editor");

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const modeSelector=document.getElementById("modeSelector");
const mirrorAxis=document.getElementById("mirrorAxis");
const mirrorInvert=document.getElementById("mirrorInvert");

const gear=document.getElementById("gear");
const controlsPanel=document.getElementById("controlsPanel");

const compareSlider=document.getElementById("compareSlider");
const leftEffect=document.getElementById("leftEffect");
const rightEffect=document.getElementById("rightEffect");

const mirrorControls=document.getElementById("mirrorControls");
const compareControls=document.getElementById("compareControls");

let original=new Image();
let video=null;
let stream=null;
let sourceType="image";

let bufferL=document.createElement("canvas");
let bufferR=document.createElement("canvas");
let ctxL=bufferL.getContext("2d");
let ctxR=bufferR.getContext("2d");

function currentSource(){
return sourceType==="video"?video:original;
}

function applyEffect(ctx,type){

const w=ctx.canvas.width;
const h=ctx.canvas.height;

let img=ctx.getImageData(0,0,w,h);
let d=img.data;

if(type==="invert"){
for(let i=0;i<d.length;i+=4){
d[i]=255-d[i];
d[i+1]=255-d[i+1];
d[i+2]=255-d[i+2];
}
}

if(type==="grayscale"){
for(let i=0;i<d.length;i+=4){
let v=(d[i]+d[i+1]+d[i+2])/3;
d[i]=d[i+1]=d[i+2]=v;
}
}

ctx.putImageData(img,0,0);
}

function renderBuffers(){

const src=currentSource();
if(!src)return;

bufferL.width=canvas.width;
bufferL.height=canvas.height;

bufferR.width=canvas.width;
bufferR.height=canvas.height;

ctxL.drawImage(src,0,0,canvas.width,canvas.height);
ctxR.drawImage(src,0,0,canvas.width,canvas.height);

applyEffect(ctxL,leftEffect.value);
applyEffect(ctxR,rightEffect.value);

}

function drawComparator(){

renderBuffers();

let split=(compareSlider.value/100)*canvas.width;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.beginPath();
ctx.rect(0,0,split,canvas.height);
ctx.clip();
ctx.drawImage(bufferL,0,0);
ctx.restore();

ctx.save();
ctx.beginPath();
ctx.rect(split,0,canvas.width-split,canvas.height);
ctx.clip();
ctx.drawImage(bufferR,0,0);
ctx.restore();

}

function quad(src,sx,sy,sw,sh,dx,dy,dw,dh,flipX,flipY){
ctx.save();
ctx.translate(dx+(flipX?dw:0),dy+(flipY?dh:0));
ctx.scale(flipX?-1:1,flipY?-1:1);
ctx.drawImage(src,sx,sy,sw,sh,0,0,dw,dh);
ctx.restore();
}

function drawMirror(){

const src=currentSource();
const w=canvas.width;
const h=canvas.height;
const hw=w/2;
const hh=h/2;

ctx.clearRect(0,0,w,h);

if(mirrorAxis.value==="both"){

if(!mirrorInvert.checked){

quad(src,0,0,hw,hh,0,0,hw,hh,false,false);
quad(src,0,0,hw,hh,hw,0,hw,hh,true,false);
quad(src,0,0,hw,hh,0,hh,hw,hh,false,true);
quad(src,0,0,hw,hh,hw,hh,hw,hh,true,true);

}else{

quad(src,0,0,hw,hh,0,0,hw,hh,true,true);
quad(src,0,0,hw,hh,hw,0,hw,hh,false,true);
quad(src,0,0,hw,hh,0,hh,hw,hh,true,false);
quad(src,0,0,hw,hh,hw,hh,hw,hh,false,false);

}

return;
}

if(mirrorAxis.value==="vertical"){
quad(src,0,0,hw,h,0,0,hw,h,false,false);
quad(src,0,0,hw,h,hw,0,hw,h,true,false);
}

if(mirrorAxis.value==="horizontal"){
quad(src,0,0,w,hh,0,0,w,hh,false,false);
quad(src,0,0,w,hh,0,hh,w,hh,false,true);
}

}

function draw(){

if(modeSelector.value==="mirror"){
drawMirror();
}else if(modeSelector.value==="comparator"){
drawComparator();
}else{
ctx.drawImage(currentSource(),0,0,canvas.width,canvas.height);
}

}

function loop(){
draw();
requestAnimationFrame(loop);
}

uploadBox.onclick=()=>fileInput.click();

fileInput.onchange=e=>{

const file=e.target.files[0];
const reader=new FileReader();

reader.onload=r=>{

original.onload=()=>{

canvas.width=original.width;
canvas.height=original.height;

startPanel.style.display="none";
editor.style.display="flex";

draw();

};

original.src=r.target.result;

};

reader.readAsDataURL(file);

};

cameraBox.onclick=async()=>{

stream=await navigator.mediaDevices.getUserMedia({video:true});

video=document.createElement("video");
video.srcObject=stream;
video.autoplay=true;
video.muted=true;

await video.play();

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

sourceType="video";

startPanel.style.display="none";
editor.style.display="flex";

loop();

};

modeSelector.onchange=()=>{

gear.style.display="block";

compareSlider.style.display="none";
mirrorControls.style.display="none";
compareControls.style.display="none";

if(modeSelector.value==="mirror"){
mirrorControls.style.display="block";
}

if(modeSelector.value==="comparator"){
compareSlider.style.display="block";
compareControls.style.display="block";
}

draw();

};

mirrorAxis.onchange=draw;
mirrorInvert.onchange=draw;
compareSlider.oninput=draw;
leftEffect.onchange=draw;
rightEffect.onchange=draw;

gear.onclick=()=>{
controlsPanel.style.display=(controlsPanel.style.display==="block")?"none":"block";
};

</script>

</body>
</html>
