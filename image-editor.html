
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite Image Editor</title>

<style>

html,body{
margin:0;
padding:0;
background:#111;
color:white;
font-family:sans-serif;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

/* UPLOAD */

#uploadBox{
width:280px;
height:280px;
border:3px dashed #777;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
text-align:center;
}

/* EDITOR */

#editor{
display:none;
flex-direction:column;
align-items:center;
}

/* WINDOW */

#imageWindow{
background:#000;
border:1px solid #444;
display:flex;
flex-direction:column;
max-width:95vw;
position:relative;
}

/* WINDOW BAR */

#windowBar{
height:32px;
background:#4b0076;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-family:monospace;
color:#00ff66;
}

#hamburger{
cursor:pointer;
font-size:18px;
}

#filename{
opacity:.85;
}

/* IMAGE */

canvas{
max-width:92vw;
max-height:60vh;
display:block;
}

/* MENU */

#menu{
position:absolute;
top:34px;
left:0;
background:#000;
border:1px solid #333;
padding:12px;
display:none;
font-family:monospace;
z-index:5;
}

#menu select{
margin-top:6px;
width:200px;
}

/* DIVIDER */

#divider{
position:absolute;
top:34px;
bottom:0;
width:5px;
background:rgba(255,255,255,0);
cursor:ew-resize;
left:50%;
z-index:4;
}

#divider:hover{
background:rgba(255,255,255,0.5);
}

/* ACTIONS */

#actions{
font-family:"Courier New", monospace;
color:#00ff66;
margin-top:10px;
}

#actions span{
cursor:pointer;
padding:6px 12px;
}

#actions span:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div id="uploadBox">
Drop Image<br>or Click
</div>

<input type="file" id="fileInput" hidden>

<div id="editor">

<div id="imageWindow">

<div id="windowBar">
<div id="hamburger">☰</div>
<div id="filename"></div>
</div>

<div id="menu">

<div>Left Effect</div>
<select id="leftEffect">
<option value="original">Original</option>
<option value="chromatic">Chromatic Aberration</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
<option value="blur">Blur</option>
</select>

<div style="margin-top:10px;">Right Effect</div>
<select id="rightEffect">
<option value="original">Original</option>
<option value="chromatic">Chromatic Aberration</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
<option value="blur">Blur</option>
</select>

</div>

<div id="divider"></div>

<canvas id="canvas"></canvas>

</div>

<div id="actions">
<span id="saveBtn">[Save]</span>
<span id="closeBtn">[CLOSE]</span>
</div>

</div>

<script>

const uploadBox=document.getElementById("uploadBox")
const fileInput=document.getElementById("fileInput")
const editor=document.getElementById("editor")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const leftEffect=document.getElementById("leftEffect")
const rightEffect=document.getElementById("rightEffect")

const hamburger=document.getElementById("hamburger")
const menu=document.getElementById("menu")

const saveBtn=document.getElementById("saveBtn")
const closeBtn=document.getElementById("closeBtn")

const filenameLabel=document.getElementById("filename")
const divider=document.getElementById("divider")

let original=new Image()

let leftCanvas=document.createElement("canvas")
let rightCanvas=document.createElement("canvas")

let leftCtx=leftCanvas.getContext("2d")
let rightCtx=rightCanvas.getContext("2d")

let split=0.5
let dragging=false

/* UPLOAD */

uploadBox.onclick=()=>fileInput.click()

uploadBox.ondragover=e=>e.preventDefault()

uploadBox.ondrop=e=>{
e.preventDefault()
loadFile(e.dataTransfer.files[0])
}

fileInput.onchange=e=>{
loadFile(e.target.files[0])
}

function loadFile(file){

const reader=new FileReader()

reader.onload=e=>{

original.onload=()=>{

canvas.width=original.width
canvas.height=original.height

leftCanvas.width=original.width
rightCanvas.width=original.width

leftCanvas.height=original.height
rightCanvas.height=original.height

filenameLabel.textContent=file.name

uploadBox.style.display="none"
editor.style.display="flex"

divider.style.left=(canvas.width*split)+"px"

generateEffects()

}

original.src=e.target.result

}

reader.readAsDataURL(file)

}

/* MENU */

hamburger.onclick=(e)=>{
e.stopPropagation()
menu.style.display=menu.style.display==="block"?"none":"block"
}

document.addEventListener("click",(e)=>{
if(!menu.contains(e.target) && e.target!==hamburger){
menu.style.display="none"
}
})

/* EFFECT AUTO UPDATE */

leftEffect.onchange=generateEffects
rightEffect.onchange=generateEffects

function generateEffects(){

applyEffect(leftEffect.value,leftCtx)
applyEffect(rightEffect.value,rightCtx)

renderSplit()

}

function renderSplit(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(rightCanvas,0,0)

ctx.save()

ctx.beginPath()
ctx.rect(0,0,canvas.width*split,canvas.height)
ctx.clip()

ctx.drawImage(leftCanvas,0,0)

ctx.restore()

}

/* DIVIDER DRAG */

divider.addEventListener("mousedown",()=>{
dragging=true
})

document.addEventListener("mouseup",()=>{
dragging=false
})

document.addEventListener("mousemove",(e)=>{

if(!dragging) return

const rect=canvas.getBoundingClientRect()

split=(e.clientX-rect.left)/rect.width

split=Math.max(0,Math.min(1,split))

divider.style.left=(split*rect.width)+"px"

renderSplit()

})

/* SAVE */

saveBtn.onclick=()=>{

const link=document.createElement("a")
link.download="edited-image.png"
link.href=canvas.toDataURL()
link.click()

}

/* CLOSE + RESET */

closeBtn.onclick=()=>{

editor.style.display="none"
uploadBox.style.display="flex"

ctx.clearRect(0,0,canvas.width,canvas.height)

original.src=""

leftCanvas.width=0
leftCanvas.height=0
rightCanvas.width=0
rightCanvas.height=0

leftEffect.value="original"
rightEffect.value="original"

filenameLabel.textContent=""

fileInput.value=""

}

/* EFFECT ENGINE */

function applyEffect(type,targetCtx){

const w=original.width
const h=original.height

targetCtx.drawImage(original,0,0)

let imgData=targetCtx.getImageData(0,0,w,h)
let d=imgData.data

if(type==="invert"){
for(let i=0;i<d.length;i+=4){
d[i]=255-d[i]
d[i+1]=255-d[i+1]
d[i+2]=255-d[i+2]
}
}

if(type==="grayscale"){
for(let i=0;i<d.length;i+=4){
let v=(d[i]+d[i+1]+d[i+2])/3
d[i]=d[i+1]=d[i+2]=v
}
}

if(type==="anaglyph"){
for(let i=0;i<d.length;i+=4){
d[i+1]=0
}
}

if(type==="chromatic"){

let copy=new Uint8ClampedArray(d)

let offsetR=12
let offsetB=-12

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let i=(y*w+x)*4

let xr=Math.min(w-1,Math.max(0,x+offsetR))
let xb=Math.min(w-1,Math.max(0,x+offsetB))

let ir=(y*w+xr)*4
let ib=(y*w+xb)*4

d[i]=copy[ir]
d[i+2]=copy[ib+2]

}
}

}

targetCtx.putImageData(imgData,0,0)

}

</script>

</body>
</html>
