
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite Image Editor</title>

<style>
html,body{
margin:0;
padding:12px 0 0 0;
background:#111;
color:white;
font-family:sans-serif;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
}

#startPanel{display:flex;gap:20px;margin-top:20px;}

#uploadBox,#cameraBox{
width:260px;height:260px;
display:flex;align-items:center;justify-content:center;
cursor:pointer;text-align:center;
}

#uploadBox{border:3px dashed #777;}
#cameraBox{border:3px dashed red;background:rgba(255,0,0,0.5);}

#editor{display:none;flex-direction:column;align-items:center;width:100%;}

#imageWindow{
background:#000;border:1px solid #444;
display:flex;flex-direction:column;
max-width:92vw;max-height:75vh;position:relative;
}

#windowBar{
height:32px;background:#4b0076;
display:flex;align-items:center;padding:0 10px;
font-family:monospace;color:#00ff66;
}

#leftControls{display:flex;gap:8px;align-items:center;}

#modeSelector{
background:#000;color:#00ff66;border:1px solid #333;
font-family:monospace;height:22px;
}

#gear{cursor:pointer;font-size:18px;width:24px;text-align:center;display:none;}

canvas{max-width:92vw;max-height:65vh;display:block;}

#controlsPanel{
position:absolute;top:34px;left:0;
background:#000;border:1px solid #333;
padding:10px;display:none;z-index:10;
font-family:monospace;
}

select,input{
background:#000;color:#00ff66;border:1px solid #333;font-family:monospace;
}

#compareSlider{width:100%;margin-top:8px;display:none;}
</style>
</head>

<body>

<div id="startPanel">
<div id="uploadBox">Drop Image<br>or Click</div>
<div id="cameraBox">Enable Camera</div>
</div>

<input type="file" id="fileInput" hidden>

<div id="editor">

<div id="imageWindow">

<div id="windowBar">
<div id="leftControls">
<select id="modeSelector">
<option value="">Select Mode</option>
<option value="comparator">Comparator</option>
<option value="mirror">Mirror</option>
</select>
<div id="gear">⚙️</div>
</div>
</div>

<div id="controlsPanel">

<div id="mirrorControls">

Mirror Axis<br>
<select id="mirrorAxis">
<option value="vertical">Vertical</option>
<option value="horizontal">Horizontal</option>
<option value="both">Both (4×)</option>
</select><br><br>

<label>
<input type="checkbox" id="mirrorInvert">
Invert Halves
</label>

</div>

</div>

<canvas id="canvas"></canvas>
<input type="range" id="compareSlider" min="0" max="100" value="50">

</div>
</div>

<script>

const uploadBox=document.getElementById("uploadBox")
const cameraBox=document.getElementById("cameraBox")
const startPanel=document.getElementById("startPanel")
const fileInput=document.getElementById("fileInput")
const editor=document.getElementById("editor")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const modeSelector=document.getElementById("modeSelector")
const gear=document.getElementById("gear")
const controlsPanel=document.getElementById("controlsPanel")

const mirrorAxis=document.getElementById("mirrorAxis")
const mirrorInvert=document.getElementById("mirrorInvert")

let sourceType="image"
let original=new Image()
let video=null
let videoStream=null

uploadBox.onclick=()=>fileInput.click()

fileInput.onchange=e=>{

const reader=new FileReader()

reader.onload=r=>{

original.onload=()=>{

sourceType="image"

canvas.width=original.width
canvas.height=original.height

startPanel.style.display="none"
editor.style.display="flex"

drawSource()

}

original.src=r.target.result

}

reader.readAsDataURL(e.target.files[0])

}

cameraBox.onclick=async ()=>{

videoStream=await navigator.mediaDevices.getUserMedia({
video:{width:{ideal:4096},height:{ideal:2160}}
})

video=document.createElement("video")
video.srcObject=videoStream
video.autoplay=true
video.muted=true
video.playsInline=true

video.onloadedmetadata=()=>{

sourceType="video"

canvas.width=video.videoWidth
canvas.height=video.videoHeight

startPanel.style.display="none"
editor.style.display="flex"

requestAnimationFrame(renderLoop)

}

}

function currentSource(){
return sourceType==="video" ? video : original
}

function drawSource(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(currentSource(),0,0,canvas.width,canvas.height)
}

function renderLoop(){

if(sourceType==="video"){

if(modeSelector.value==="mirror"){
renderMirror()
}else{
drawSource()
}

requestAnimationFrame(renderLoop)

}

}

modeSelector.onchange=()=>{

gear.style.display="none"
controlsPanel.style.display="none"

if(modeSelector.value==="mirror"){
gear.style.display="block"
renderMirror()
}else{
drawSource()
}

}

gear.onclick=()=>{

controlsPanel.style.display =
controlsPanel.style.display==="block"?"none":"block"

}

mirrorAxis.onchange=renderMirror
mirrorInvert.onchange=renderMirror

function quad(src,sx,sy,sw,sh,dx,dy,dw,dh,flipX,flipY){

ctx.save()
ctx.translate(dx+(flipX?dw:0),dy+(flipY?dh:0))
ctx.scale(flipX?-1:1,flipY?-1:1)
ctx.drawImage(src,sx,sy,sw,sh,0,0,dw,dh)
ctx.restore()

}

function renderMirror(){

let src=currentSource()

let w=canvas.width
let h=canvas.height
let hw=w/2
let hh=h/2

ctx.clearRect(0,0,w,h)

if(mirrorAxis.value==="both"){

quad(src,0,0,hw,hh,0,0,hw,hh,false,false)
quad(src,0,0,hw,hh,hw,0,hw,hh,true,false)

if(!mirrorInvert.checked){

quad(src,0,0,hw,hh,0,hh,hw,hh,false,true)
quad(src,0,0,hw,hh,hw,hh,hw,hh,true,true)

}else{

quad(src,0,0,hw,hh,0,hh,hw,hh,true,true)
quad(src,0,0,hw,hh,hw,hh,hw,hh,false,true)

}

return

}

if(mirrorAxis.value==="vertical"){

quad(src,0,0,hw,h,0,0,hw,h,false,false)
quad(src,0,0,hw,h,hw,0,hw,h,true,false)
return

}

if(mirrorAxis.value==="horizontal"){

quad(src,0,0,w,hh,0,0,w,hh,false,false)
quad(src,0,0,w,hh,0,hh,w,hh,false,true)
return

}

}

</script>

</body>
</html>
