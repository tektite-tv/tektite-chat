
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite Image Editor</title>

<style>
html,body{
margin:0;
padding:12px 0 0 0;
background:#111;
color:white;
font-family:sans-serif;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
}

#startPanel{display:flex;gap:20px;margin-top:20px;}

#uploadBox,#cameraBox{
width:260px;height:260px;
display:flex;align-items:center;justify-content:center;
cursor:pointer;text-align:center;
}

#uploadBox{border:3px dashed #777;}
#cameraBox{border:3px dashed red;background:rgba(255,0,0,0.5);}

#editor{display:none;flex-direction:column;align-items:center;width:100%;}

#imageWindow{
background:#000;border:1px solid #444;
display:flex;flex-direction:column;
max-width:92vw;max-height:75vh;position:relative;
}

#windowBar{
height:32px;background:#4b0076;
display:flex;align-items:center;justify-content:space-between;
padding:0 10px;font-family:monospace;color:#00ff66;
}

#leftControls{display:flex;gap:8px;align-items:center;}

#modeSelector{
background:#000;color:#00ff66;border:1px solid #333;
font-family:monospace;height:22px;
}

#gear{cursor:pointer;font-size:18px;width:24px;text-align:center;display:none;}

canvas{max-width:92vw;max-height:65vh;display:block;}

#controlsPanel{
position:absolute;top:34px;left:0;
background:#000;border:1px solid #333;
padding:10px;display:none;z-index:10;
font-family:monospace;
}

select,input{
background:#000;color:#00ff66;border:1px solid #333;font-family:monospace;
}

#compareSlider{width:100%;margin-top:8px;display:none;}

#actions{
font-family:"Courier New", monospace;color:#00ff66;
margin-top:40px;padding-bottom:40px;
}

#actions span{cursor:pointer;padding:6px 12px;}
</style>
</head>

<body>

<div id="startPanel">
<div id="uploadBox">Drop Image<br>or Click</div>
<div id="cameraBox">Enable Camera</div>
</div>

<input type="file" id="fileInput" hidden>

<div id="editor">

<div id="imageWindow">

<div id="windowBar">
<div id="leftControls">
<select id="modeSelector">
<option value="">Select Mode</option>
<option value="comparator">Comparator</option>
<option value="mirror">Mirror</option>
</select>
<div id="gear">⚙️</div>
</div>
</div>

<div id="controlsPanel">

<div id="comparatorControls">

<b>Comparator Controls</b><br><br>

Left Effect<br>
<select id="leftEffect">
<option value="original">Original</option>
<option value="chromatic">Chromatic Aberration</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
<option value="blur">Blur</option>
</select><br><br>

Right Effect<br>
<select id="rightEffect">
<option value="original">Original</option>
<option value="chromatic">Chromatic Aberration</option>
<option value="anaglyph">Anaglyph</option>
<option value="grayscale">Grayscale</option>
<option value="invert">Invert</option>
<option value="blur">Blur</option>
</select>

</div>

<div id="mirrorControls" style="display:none">

<b>Mirror Controls</b><br><br>

Mirror Axis<br>
<select id="mirrorAxis">
<option value="vertical">Vertical</option>
<option value="horizontal">Horizontal</option>
</select><br><br>

<label>
<input type="checkbox" id="mirrorInvert">
Invert Halves
</label>

</div>

</div>

<canvas id="canvas"></canvas>
<input type="range" id="compareSlider" min="0" max="100" value="50">

</div>

<div id="actions">
<span id="saveBtn">[Save]</span>
<span id="closeBtn">[CLOSE]</span>
</div>

</div>

<script>

const uploadBox=document.getElementById("uploadBox")
const cameraBox=document.getElementById("cameraBox")
const startPanel=document.getElementById("startPanel")
const fileInput=document.getElementById("fileInput")
const editor=document.getElementById("editor")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const modeSelector=document.getElementById("modeSelector")
const gear=document.getElementById("gear")
const controlsPanel=document.getElementById("controlsPanel")

const comparatorControls=document.getElementById("comparatorControls")
const mirrorControls=document.getElementById("mirrorControls")

const compareSlider=document.getElementById("compareSlider")

const leftEffect=document.getElementById("leftEffect")
const rightEffect=document.getElementById("rightEffect")

const mirrorAxis=document.getElementById("mirrorAxis")
const mirrorInvert=document.getElementById("mirrorInvert")

let sourceType="image"
let original=new Image()
let video=null
let videoStream=null

let leftCanvas=document.createElement("canvas")
let rightCanvas=document.createElement("canvas")

let leftCtx=leftCanvas.getContext("2d")
let rightCtx=rightCanvas.getContext("2d")

uploadBox.onclick=()=>fileInput.click()

fileInput.onchange=e=>{

const reader=new FileReader()

reader.onload=r=>{

original.onload=()=>{

sourceType="image"

canvas.width=original.width
canvas.height=original.height

leftCanvas.width=canvas.width
rightCanvas.width=canvas.width
leftCanvas.height=canvas.height
rightCanvas.height=canvas.height

startPanel.style.display="none"
editor.style.display="flex"

drawSource()

}

original.src=r.target.result

}

reader.readAsDataURL(e.target.files[0])

}

cameraBox.onclick=async ()=>{

videoStream=await navigator.mediaDevices.getUserMedia({
video:{width:{ideal:4096},height:{ideal:2160}}
})

video=document.createElement("video")
video.srcObject=videoStream
video.play()

video.onloadedmetadata=()=>{

sourceType="video"

canvas.width=video.videoWidth
canvas.height=video.videoHeight

leftCanvas.width=canvas.width
rightCanvas.width=canvas.width
leftCanvas.height=canvas.height
rightCanvas.height=canvas.height

startPanel.style.display="none"
editor.style.display="flex"

requestAnimationFrame(loop)

}

}

function drawSource(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(sourceType==="image"){
ctx.drawImage(original,0,0)
}else{
ctx.drawImage(video,0,0)
}

}

function loop(){

if(sourceType==="video"){

if(modeSelector.value==="comparator"){
generateComparator()
}
else if(modeSelector.value==="mirror"){
renderMirror()
}
else{
drawSource()
}

requestAnimationFrame(loop)

}

}

modeSelector.onchange=()=>{

controlsPanel.style.display="none"
gear.style.display="none"
compareSlider.style.display="none"

comparatorControls.style.display="none"
mirrorControls.style.display="none"

if(modeSelector.value==="comparator"){
gear.style.display="block"
compareSlider.style.display="block"
comparatorControls.style.display="block"
}

if(modeSelector.value==="mirror"){
gear.style.display="block"
mirrorControls.style.display="block"
renderMirror()
}

}

gear.onclick=()=>{
controlsPanel.style.display =
controlsPanel.style.display==="block"?"none":"block"
}

compareSlider.oninput=()=>{ if(sourceType==="image") generateComparator() }
leftEffect.onchange=()=>{ if(sourceType==="image") generateComparator() }
rightEffect.onchange=()=>{ if(sourceType==="image") generateComparator() }

function generateComparator(){

let source = sourceType==="video" ? video : original

leftCtx.drawImage(source,0,0,canvas.width,canvas.height)
rightCtx.drawImage(source,0,0,canvas.width,canvas.height)

applyEffect(leftEffect.value,leftCtx)
applyEffect(rightEffect.value,rightCtx)

let split = compareSlider.value/100
let splitX = canvas.width * split

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(leftCanvas,0,0,splitX,canvas.height,0,0,splitX,canvas.height)
ctx.drawImage(rightCanvas,splitX,0,canvas.width-splitX,canvas.height,splitX,0,canvas.width-splitX,canvas.height)

}

mirrorAxis.onchange=renderMirror
mirrorInvert.onchange=renderMirror

function renderMirror(){

let source = sourceType==="video" ? video : original

ctx.clearRect(0,0,canvas.width,canvas.height)

let axisX = canvas.width/2
let axisY = canvas.height/2

if(mirrorAxis.value==="vertical"){

if(!mirrorInvert.checked){

ctx.drawImage(source,0,0,axisX,canvas.height,0,0,axisX,canvas.height)

ctx.save()
ctx.translate(canvas.width,0)
ctx.scale(-1,1)
ctx.drawImage(source,0,0,axisX,canvas.height,0,0,axisX,canvas.height)
ctx.restore()

}else{

ctx.save()
ctx.translate(axisX,0)
ctx.scale(-1,1)
ctx.drawImage(source,0,0,axisX,canvas.height,0,0,axisX,canvas.height)
ctx.restore()

ctx.drawImage(source,0,0,axisX,canvas.height,axisX,0,axisX,canvas.height)

}

}else{

if(!mirrorInvert.checked){

ctx.drawImage(source,0,0,canvas.width,axisY,0,0,canvas.width,axisY)

ctx.save()
ctx.translate(0,canvas.height)
ctx.scale(1,-1)
ctx.drawImage(source,0,0,canvas.width,axisY,0,0,canvas.width,axisY)
ctx.restore()

}else{

ctx.save()
ctx.translate(0,axisY)
ctx.scale(1,-1)
ctx.drawImage(source,0,0,canvas.width,axisY,0,0,canvas.width,axisY)
ctx.restore()

ctx.drawImage(source,0,0,canvas.width,axisY,0,axisY,canvas.width,axisY)

}

}

}

function applyEffect(type,targetCtx){

const w=canvas.width
const h=canvas.height

let imgData=targetCtx.getImageData(0,0,w,h)
let d=imgData.data

if(type==="invert"){
for(let i=0;i<d.length;i+=4){
d[i]=255-d[i]
d[i+1]=255-d[i+1]
d[i+2]=255-d[i+2]
}
}

if(type==="grayscale"){
for(let i=0;i<d.length;i+=4){
let v=(d[i]+d[i+1]+d[i+2])/3
d[i]=d[i+1]=d[i+2]=v
}
}

if(type==="anaglyph"){
for(let i=0;i<d.length;i+=4){
d[i+1]=0
}
}

if(type==="chromatic"){

let copy=new Uint8ClampedArray(d)

let offsetR=12
let offsetB=-12

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let i=(y*w+x)*4

let xr=Math.min(w-1,Math.max(0,x+offsetR))
let xb=Math.min(w-1,Math.max(0,x+offsetB))

let ir=(y*w+xr)*4
let ib=(y*w+xb)*4

d[i]=copy[ir]
d[i+2]=copy[ib+2]

}
}
}

if(type==="blur"){

let copy=new Uint8ClampedArray(d)

for(let y=1;y<h-1;y++){
for(let x=1;x<w-1;x++){

let i=(y*w+x)*4

let sumR=0,sumG=0,sumB=0,count=0

for(let dy=-1;dy<=1;dy++){
for(let dx=-1;dx<=1;dx++){

let ii=((y+dy)*w+(x+dx))*4

sumR+=copy[ii]
sumG+=copy[ii+1]
sumB+=copy[ii+2]
count++

}
}

d[i]=sumR/count
d[i+1]=sumG/count
d[i+2]=sumB/count

}
}

}

targetCtx.putImageData(imgData,0,0)

}

</script>

</body>
</html>
