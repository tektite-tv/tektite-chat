<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite Image Editor</title>

<style>

html,body{
margin:0;
padding:0;
background:#111;
color:white;
font-family:sans-serif;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

/* UPLOAD */

#uploadBox{
width:280px;
height:280px;
border:3px dashed #777;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
text-align:center;
}

/* EDITOR */

#editor{
display:none;
flex-direction:column;
align-items:center;
}

/* WINDOW */

#imageWindow{
background:#000;
border:1px solid #444;
display:flex;
flex-direction:column;
max-width:95vw;
position:relative;
}

/* WINDOW BAR */

#windowBar{
height:32px;
background:#4b0076;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
font-family:monospace;
color:#00ff66;
}

#modeSelector{
background:#000;
color:#00ff66;
border:1px solid #333;
font-family:monospace;
}

#filename{
opacity:.85;
}

/* IMAGE */

canvas{
max-width:92vw;
max-height:60vh;
display:block;
position:relative;
z-index:1;
}

/* DIVIDER */

#dividerLine{
position:absolute;
top:34px;
bottom:-30px;
width:5px;
background:rgba(255,255,255,0);
left:50%;
z-index:6;
pointer-events:none;
}

#dividerLine:hover{
background:rgba(255,255,255,0.5);
}

/* HANDLE */

#dividerHandle{
width:28px;
height:28px;
border-radius:50%;
background:#4b0076;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
cursor:ew-resize;
position:absolute;
bottom:-40px;
left:50%;
transform:translateX(-50%);
z-index:8;
}

#dividerHandle::after{
content:"↔";
font-size:14px;
color:white;
}

/* ACTIONS */

#actions{
font-family:"Courier New", monospace;
color:#00ff66;
margin-top:60px;
}

#actions span{
cursor:pointer;
padding:6px 12px;
}

#actions span:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div id="uploadBox">
Drop Image<br>or Click
</div>

<input type="file" id="fileInput" hidden>

<div id="editor">

<div id="imageWindow">

<div id="windowBar">

<select id="modeSelector">
<option value="comparator">Comparator</option>
</select>

<div id="filename"></div>

</div>

<div id="dividerLine"></div>
<div id="dividerHandle"></div>

<canvas id="canvas"></canvas>

</div>

<div id="actions">
<span id="saveBtn">[Save]</span>
<span id="closeBtn">[CLOSE]</span>
</div>

</div>

<script>

const uploadBox=document.getElementById("uploadBox")
const fileInput=document.getElementById("fileInput")
const editor=document.getElementById("editor")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const saveBtn=document.getElementById("saveBtn")
const closeBtn=document.getElementById("closeBtn")

const filenameLabel=document.getElementById("filename")

const dividerLine=document.getElementById("dividerLine")
const dividerHandle=document.getElementById("dividerHandle")

const modeSelector=document.getElementById("modeSelector")

let original=new Image()

let leftCanvas=document.createElement("canvas")
let rightCanvas=document.createElement("canvas")

let leftCtx=leftCanvas.getContext("2d")
let rightCtx=rightCanvas.getContext("2d")

let split=0.5
let dragging=false

/* UPLOAD */

uploadBox.onclick=()=>fileInput.click()

uploadBox.ondragover=e=>e.preventDefault()

uploadBox.ondrop=e=>{
e.preventDefault()
loadFile(e.dataTransfer.files[0])
}

fileInput.onchange=e=>{
loadFile(e.target.files[0])
}

function loadFile(file){

const reader=new FileReader()

reader.onload=e=>{

original.onload=()=>{

canvas.width=original.width
canvas.height=original.height

leftCanvas.width=original.width
rightCanvas.width=original.width

leftCanvas.height=original.height
rightCanvas.height=original.height

filenameLabel.textContent=file.name

uploadBox.style.display="none"
editor.style.display="flex"

runMode()

}

original.src=e.target.result

}

reader.readAsDataURL(file)

}

/* MODE SYSTEM */

modeSelector.onchange=runMode

function runMode(){

if(modeSelector.value==="comparator"){
generateComparator()
}

}

/* COMPARATOR */

function generateComparator(){

leftCtx.drawImage(original,0,0)
rightCtx.drawImage(original,0,0)

renderSplit()
updateDivider()

}

function renderSplit(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(rightCanvas,0,0)

ctx.save()

ctx.beginPath()
ctx.rect(0,0,canvas.width*split,canvas.height)
ctx.clip()

ctx.drawImage(leftCanvas,0,0)

ctx.restore()

}

/* DIVIDER */

function updateDivider(){

const rect=canvas.getBoundingClientRect()
const pos=rect.width*split

dividerLine.style.left=pos+"px"
dividerHandle.style.left=pos+"px"

}

dividerHandle.addEventListener("mousedown",()=>{
dragging=true
})

document.addEventListener("mouseup",()=>{
dragging=false
})

document.addEventListener("mousemove",(e)=>{

if(!dragging) return

const rect=canvas.getBoundingClientRect()

split=(e.clientX-rect.left)/rect.width
split=Math.max(0,Math.min(1,split))

updateDivider()
renderSplit()

})

/* SAVE */

saveBtn.onclick=()=>{

const link=document.createElement("a")
link.download="edited-image.png"
link.href=canvas.toDataURL()
link.click()

}

/* CLOSE */

closeBtn.onclick=()=>{

editor.style.display="none"
uploadBox.style.display="flex"

ctx.clearRect(0,0,canvas.width,canvas.height)

original.src=""

leftCanvas.width=0
leftCanvas.height=0
rightCanvas.width=0
rightCanvas.height=0

filenameLabel.textContent=""

fileInput.value=""

}

</script>

</body>
</html>
