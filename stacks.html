<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infinite Pyramid Layers</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

#menu{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
border:1px solid #444;
padding:20px;
display:none;
color:white;
z-index:5;
}

#hint{
position:fixed;
bottom:10px;
left:10px;
color:#aaa;
font-size:12px;
}
</style>

</head>
<body>

<div id="menu">
<h3>Settings</h3>
Upload Image<br>
<input type="file" id="upload">
</div>

<div id="hint">
WASD move | QE up/down | Middle mouse rotate | ESC menu
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
100000
)

camera.position.set(0,30,0)
camera.lookAt(0,0,0)

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight)
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
})

let loader=new THREE.TextureLoader()

let texture=loader.load("texture.jpg")

let layers=[]

function build(tex){

layers.forEach(l=>scene.remove(l))
layers=[]

let size=2
let height=1
let y=0

for(let i=0;i<40;i++){

let geo=new THREE.BoxGeometry(size,height,size)

let topMat=new THREE.MeshBasicMaterial({
map:tex
})

let sideMat=new THREE.MeshBasicMaterial({
map:tex
})

let bottomMat=new THREE.MeshBasicMaterial({color:0x000000})

let mats=[
sideMat, // right
sideMat, // left
topMat,  // top
bottomMat,
sideMat,
sideMat
]

let mesh=new THREE.Mesh(geo,mats)

mesh.position.y=-y

scene.add(mesh)
layers.push(mesh)

y+=height
size*=2

}

}

build(texture)

let keys={}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

let yaw=0
let pitch=-Math.PI/2

let dragging=false

document.addEventListener("mousedown",e=>{
if(e.button===1) dragging=true
})

document.addEventListener("mouseup",()=>dragging=false)

document.addEventListener("mousemove",e=>{

if(!dragging) return

yaw-=e.movementX*0.002
pitch-=e.movementY*0.002

pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch))

})

document.addEventListener("keydown",e=>{
if(e.key==="Escape"){
let m=document.getElementById("menu")
m.style.display=m.style.display==="none"?"block":"none"
}
})

document.getElementById("upload").addEventListener("change",e=>{

let file=e.target.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=function(ev){

let tex=new THREE.TextureLoader().load(ev.target.result)
build(tex)

}

reader.readAsDataURL(file)

})

function move(){

let speed=0.5

let forward=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion)
let right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion)

if(keys["w"]) camera.position.add(forward.multiplyScalar(speed))
if(keys["s"]) camera.position.add(forward.multiplyScalar(-speed))
if(keys["a"]) camera.position.add(right.multiplyScalar(-speed))
if(keys["d"]) camera.position.add(right.multiplyScalar(speed))
if(keys["q"]) camera.position.y+=speed
if(keys["e"]) camera.position.y-=speed

}

function animate(){

requestAnimationFrame(animate)

camera.rotation.order="YXZ"
camera.rotation.y=yaw
camera.rotation.x=pitch

move()

renderer.render(scene,camera)

}

animate()

</script>
</body>
</html>
