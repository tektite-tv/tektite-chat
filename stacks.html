<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4D Torus Portal</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

#menu{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
border:1px solid #555;
padding:20px;
display:none;
color:white;
z-index:10;
}

#hint{
position:fixed;
bottom:10px;
left:10px;
color:#aaa;
font-size:12px;
}
</style>

</head>
<body>

<div id="menu">
<h3>Settings</h3>
<input type="file" id="upload">
</div>

<div id="hint">
Mouse rotate • Scroll zoom • WASD control 4D rotation • ESC menu
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* ---------- SCENE ---------- */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
100000
)

let camRadius = 180
let theta = 0
let phi = 0.6

function updateCamera(){

camera.position.x = camRadius * Math.sin(phi) * Math.cos(theta)
camera.position.y = camRadius * Math.cos(phi)
camera.position.z = camRadius * Math.sin(phi) * Math.sin(theta)

camera.lookAt(0,0,0)

}

updateCamera()

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight)
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
})

/* ---------- STARFIELD ---------- */

function createStarfield(){

const starCount = 20000
const geometry = new THREE.BufferGeometry()

const positions = new Float32Array(starCount*3)
const radius = 20000

for(let i=0;i<starCount;i++){

const theta = Math.random()*Math.PI*2
const phi = Math.acos((Math.random()*2)-1)

positions[i*3] = radius*Math.sin(phi)*Math.cos(theta)
positions[i*3+1] = radius*Math.sin(phi)*Math.sin(theta)
positions[i*3+2] = radius*Math.cos(phi)

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
color:0xffffff,
size:4
})

const stars = new THREE.Points(geometry,material)
scene.add(stars)

}

createStarfield()

/* ---------- TEXTURE ---------- */

const loader = new THREE.TextureLoader()
let texture = loader.load("L_0.jpg")

/* ---------- TORUS ---------- */

let torusGroup = new THREE.Group()
scene.add(torusGroup)

function build(tex){

torusGroup.clear()

const majorRadius = 70
const tubeRadius = 22
const rings = 200

const mat = new THREE.MeshBasicMaterial({
map: tex,
side: THREE.DoubleSide
})

for(let i=0;i<rings;i++){

const u = (i / rings) * Math.PI * 2

const cx = Math.cos(u) * majorRadius
const cz = Math.sin(u) * majorRadius

const geo = new THREE.RingGeometry(
tubeRadius,
tubeRadius + 0.6,
128
)

const ring = new THREE.Mesh(geo,mat)

ring.lookAt(0,0,0)

ring.userData.p4 = {
x: cx,
y: 0,
z: cz,
w: 0
}

torusGroup.add(ring)

}

}

build(texture)

/* ---------- CAMERA CONTROLS ---------- */

let dragging=false
let lastX=0
let lastY=0

renderer.domElement.addEventListener("mousedown",(e)=>{
if(menuOpen) return
dragging=true
lastX=e.clientX
lastY=e.clientY
})

window.addEventListener("mouseup",()=>dragging=false)

window.addEventListener("mousemove",(e)=>{

if(!dragging) return

theta -= (e.clientX-lastX)*0.005
phi -= (e.clientY-lastY)*0.005

lastX=e.clientX
lastY=e.clientY

updateCamera()

})

renderer.domElement.addEventListener("wheel",(e)=>{

camRadius += e.deltaY*0.08
camRadius=Math.max(30,Math.min(4000,camRadius))

updateCamera()

})

/* ---------- MENU ---------- */

let menuOpen=false
const menu=document.getElementById("menu")

window.addEventListener("keydown",(e)=>{

if(e.key==="Escape"){

menuOpen=!menuOpen
menu.style.display = menuOpen ? "block":"none"

}

})

/* ---------- TEXTURE UPLOAD ---------- */

document.getElementById("upload").addEventListener("change",(e)=>{

const file=e.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(ev){

texture=new THREE.TextureLoader().load(ev.target.result)
build(texture)

}

reader.readAsDataURL(file)

})

/* ---------- KEYBOARD CONTROL ---------- */

const keys={}

window.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true
})

window.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false
})

/* ---------- 4D ROTATION ---------- */

let rotZW = 0
let rotXW = 0
const projDist = 6

/* ---------- LOOP ---------- */

function animate(){

requestAnimationFrame(animate)

const speed = 0.03

if(keys["w"]) rotZW += speed
if(keys["s"]) rotZW -= speed
if(keys["a"]) rotXW += speed
if(keys["d"]) rotXW -= speed

const cosZW = Math.cos(rotZW)
const sinZW = Math.sin(rotZW)

const cosXW = Math.cos(rotXW)
const sinXW = Math.sin(rotXW)

torusGroup.children.forEach(ring => {

let p = ring.userData.p4

/* ZW rotation */

let z = p.z * cosZW - p.w * sinZW
let w = p.z * sinZW + p.w * cosZW

/* XW rotation */

let x = p.x * cosXW - w * sinXW
w = p.x * sinXW + w * cosXW

/* projection */

const scale = projDist / (projDist - w)

ring.position.x = x * scale
ring.position.y = p.y * scale
ring.position.z = z * scale

})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
