<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texture Pyramid</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

#menu{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
border:1px solid #555;
padding:20px;
display:none;
color:white;
z-index:10;
}

#hint{
position:fixed;
bottom:10px;
left:10px;
color:#aaa;
font-size:12px;
}
</style>

</head>
<body>

<div id="menu">
<h3>Settings</h3>
<input type="file" id="upload">
</div>

<div id="hint">
WASD move | QE up/down | Middle mouse rotate | ESC menu
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
100000
)

camera.position.set(0,40,40)
camera.lookAt(0,0,0)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight)
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
})

/* ---------------- STARFIELD ---------------- */

function createStarfield(){

const starCount = 15000
const geometry = new THREE.BufferGeometry()

const positions = new Float32Array(starCount * 3)

for(let i=0;i<starCount;i++){

positions[i*3+0]=(Math.random()-0.5)*20000
positions[i*3+1]=(Math.random()-0.5)*20000
positions[i*3+2]=(Math.random()-0.5)*20000

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
color:0xbbddff,
size:2,
sizeAttenuation:true
})

const stars = new THREE.Points(geometry,material)
scene.add(stars)

}

createStarfield()

/* ---------------- TEXTURE ---------------- */

const loader = new THREE.TextureLoader()
let texture = loader.load("L_0.jpg")

let layers=[]

function makeLayer(size,height,tex){

const geometry = new THREE.BoxGeometry(size,height,size)

const topMaterial = new THREE.MeshBasicMaterial({map:tex})
const sideMaterial = new THREE.MeshBasicMaterial({map:tex})
const bottomMaterial = new THREE.MeshBasicMaterial({color:0x000000})

const materials=[
sideMaterial,
sideMaterial,
topMaterial,
bottomMaterial,
sideMaterial,
sideMaterial
]

return new THREE.Mesh(geometry,materials)

}

function build(tex){

layers.forEach(l=>scene.remove(l))
layers=[]

let size=2
let height=1
let y=0

for(let i=0;i<40;i++){

const mesh = makeLayer(size,height,tex)

mesh.position.y=-y

scene.add(mesh)
layers.push(mesh)

/* FIX 1: reduced growth */
size *= 1.35

/* FIX 2: added vertical spacing */
y += height * 2

}

}

build(texture)

/* ---------------- CAMERA CONTROLS ---------------- */

let yaw=0
let pitch=-Math.PI/4
let dragging=false

document.addEventListener("mousedown",e=>{
if(e.button===1) dragging=true
})

document.addEventListener("mouseup",()=>dragging=false)

document.addEventListener("mousemove",e=>{

if(!dragging) return

yaw -= e.movementX * 0.002
pitch -= e.movementY * 0.002

pitch = Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch))

})

const keys={}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

/* ---------------- MENU ---------------- */

document.addEventListener("keydown",e=>{
if(e.key==="Escape"){
const m=document.getElementById("menu")
m.style.display = m.style.display==="none"?"block":"none"
}
})

document.getElementById("upload").addEventListener("change",e=>{

const file=e.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(ev){

texture=new THREE.TextureLoader().load(ev.target.result)
build(texture)

}

reader.readAsDataURL(file)

})

/* ---------------- MOVEMENT ---------------- */

function move(){

const speed=0.6

const forward=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion)
const right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion)

if(keys["w"]) camera.position.add(forward.multiplyScalar(speed))
if(keys["s"]) camera.position.add(forward.multiplyScalar(-speed))
if(keys["a"]) camera.position.add(right.multiplyScalar(-speed))
if(keys["d"]) camera.position.add(right.multiplyScalar(speed))
if(keys["q"]) camera.position.y+=speed
if(keys["e"]) camera.position.y-=speed

}

function animate(){

requestAnimationFrame(animate)

camera.rotation.order="YXZ"
camera.rotation.y=yaw
camera.rotation.x=pitch

move()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
