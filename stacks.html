<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texture Wormhole</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

#menu{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
border:1px solid #555;
padding:20px;
display:none;
color:white;
z-index:10;
}

#hint{
position:fixed;
bottom:10px;
left:10px;
color:#aaa;
font-size:12px;
}
</style>

</head>
<body>

<div id="menu">
<h3>Settings</h3>
<input type="file" id="upload">
</div>

<div id="hint">
Left drag rotate | Scroll zoom | Right drag pan | ESC menu
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>

/* ---------- SCENE ---------- */

const scene = new THREE.Scene()
scene.fog = new THREE.FogExp2(0x000000,0.0006)

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
100000
)

camera.position.set(0,40,80)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight)
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
})

/* ---------- ORBIT CAMERA ---------- */

const controls = new THREE.OrbitControls(camera,renderer.domElement)

controls.target.set(0,0,0)
controls.enableDamping = true
controls.dampingFactor = 0.05

controls.minDistance = 10
controls.maxDistance = 1000

controls.enablePan = true
controls.enableZoom = true
controls.enableRotate = true

/* ---------- STARFIELD ---------- */

function createStarfield(){

const starCount = 15000
const geometry = new THREE.BufferGeometry()

const positions = new Float32Array(starCount * 3)

for(let i=0;i<starCount;i++){

positions[i*3+0]=(Math.random()-0.5)*20000
positions[i*3+1]=(Math.random()-0.5)*20000
positions[i*3+2]=(Math.random()-0.5)*20000

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
color:0xbbddff,
size:2,
sizeAttenuation:true
})

const stars = new THREE.Points(geometry,material)
scene.add(stars)

}

createStarfield()

/* ---------- TEXTURE ---------- */

const loader = new THREE.TextureLoader()
let texture = loader.load("L_0.jpg")

/* ---------- WORMHOLE GROUPS ---------- */

let wormholeGroup = new THREE.Group()
scene.add(wormholeGroup)

let mirrorGroup = new THREE.Group()
scene.add(mirrorGroup)

/* ---------- BUILD GEOMETRY ---------- */

function build(tex){

wormholeGroup.clear()
mirrorGroup.clear()

let radius = 5
let depth = 0
const layers = 80

for(let i=0;i<layers;i++){

const geo = new THREE.RingGeometry(radius,radius+2,64,1)

const mat = new THREE.MeshBasicMaterial({
map:tex,
side:THREE.DoubleSide
})

const ring = new THREE.Mesh(geo,mat)

ring.rotation.x = Math.PI/2
ring.position.y = -depth

wormholeGroup.add(ring)

const mirror = ring.clone()
mirror.scale.y = -1
mirror.position.y = depth

mirrorGroup.add(mirror)

depth += 2
radius *= 1.05

}

}

build(texture)

/* ---------- MENU / ESC FIX ---------- */

const menu = document.getElementById("menu")

window.addEventListener("keydown",(e)=>{

if(e.key === "Escape"){

e.preventDefault()

if(menu.style.display === "none" || menu.style.display === ""){

menu.style.display = "block"
controls.enabled = false

}else{

menu.style.display = "none"
controls.enabled = true

}

}

})

/* disable camera while interacting with menu */

menu.addEventListener("mouseenter",()=>controls.enabled=false)
menu.addEventListener("mouseleave",()=>controls.enabled=true)

/* ---------- IMAGE UPLOAD ---------- */

document.getElementById("upload").addEventListener("change",(e)=>{

const file = e.target.files[0]
if(!file) return

const reader = new FileReader()

reader.onload = function(ev){

texture = new THREE.TextureLoader().load(ev.target.result)
build(texture)

}

reader.readAsDataURL(file)

})

/* ---------- RENDER LOOP ---------- */

function animate(){

requestAnimationFrame(animate)

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
