<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Texture Wormhole</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

#menu{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
border:1px solid #555;
padding:20px;
display:none;
color:white;
z-index:10;
}

#hint{
position:fixed;
bottom:10px;
left:10px;
color:#aaa;
font-size:12px;
}
</style>

</head>
<body>

<div id="menu">
<h3>Settings</h3>
<input type="file" id="upload">
</div>

<div id="hint">
Left drag rotate • Scroll zoom • ESC menu
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* ---------- SCENE ---------- */

const scene = new THREE.Scene()
scene.fog = new THREE.FogExp2(0x000000,0.00025)

const camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
100000
)

let radius = 120
let theta = 0
let phi = 0.6

function updateCamera(){

camera.position.x = radius * Math.sin(phi) * Math.cos(theta)
camera.position.y = radius * Math.cos(phi)
camera.position.z = radius * Math.sin(phi) * Math.sin(theta)

camera.lookAt(0,0,0)

}

updateCamera()

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight)
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
})

/* ---------- STARFIELD ---------- */

function createStarfield(){

const starCount = 20000
const geometry = new THREE.BufferGeometry()

const positions = new Float32Array(starCount*3)
const radius = 20000

for(let i=0;i<starCount;i++){

const theta = Math.random()*Math.PI*2
const phi = Math.acos((Math.random()*2)-1)

positions[i*3] = radius*Math.sin(phi)*Math.cos(theta)
positions[i*3+1] = radius*Math.sin(phi)*Math.sin(theta)
positions[i*3+2] = radius*Math.cos(phi)

}

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
color:0xffffff,
size:5
})

const stars = new THREE.Points(geometry,material)
scene.add(stars)

}

createStarfield()

/* ---------- TEXTURE ---------- */

const loader = new THREE.TextureLoader()
let texture = loader.load("L_0.jpg")

/* ---------- WORMHOLE ---------- */

let wormholeGroup = new THREE.Group()
scene.add(wormholeGroup)

let mirrorGroup = new THREE.Group()
scene.add(mirrorGroup)

function build(tex){

wormholeGroup.clear()
mirrorGroup.clear()

let r = 5
let depth = 0

for(let i=0;i<80;i++){

const geo = new THREE.RingGeometry(r,r+2,64)

const mat = new THREE.MeshBasicMaterial({
map:tex,
side:THREE.DoubleSide
})

const ring = new THREE.Mesh(geo,mat)

ring.rotation.x = Math.PI/2
ring.position.y = -depth

wormholeGroup.add(ring)

const mirror = ring.clone()
mirror.scale.y = -1
mirror.position.y = depth

mirrorGroup.add(mirror)

depth += 2
r *= 1.05

}

}

build(texture)

/* ---------- CAMERA CONTROLS ---------- */

let dragging=false
let lastX=0
let lastY=0

renderer.domElement.addEventListener("mousedown",(e)=>{
if(menuOpen) return
dragging=true
lastX=e.clientX
lastY=e.clientY
})

window.addEventListener("mouseup",()=>dragging=false)

window.addEventListener("mousemove",(e)=>{

if(!dragging) return

theta -= (e.clientX-lastX)*0.005
phi -= (e.clientY-lastY)*0.005

phi=Math.max(0.1,Math.min(Math.PI-0.1,phi))

lastX=e.clientX
lastY=e.clientY

updateCamera()

})

renderer.domElement.addEventListener("wheel",(e)=>{

radius += e.deltaY*0.05
radius=Math.max(10,Math.min(2000,radius))

updateCamera()

})

/* ---------- MENU ---------- */

let menuOpen=false
const menu=document.getElementById("menu")

window.addEventListener("keydown",(e)=>{

if(e.key==="Escape"){

menuOpen=!menuOpen

menu.style.display = menuOpen ? "block":"none"

}

})

/* ---------- TEXTURE UPLOAD ---------- */

document.getElementById("upload").addEventListener("change",(e)=>{

const file=e.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(ev){

texture=new THREE.TextureLoader().load(ev.target.result)
build(texture)

}

reader.readAsDataURL(file)

})

/* ---------- LOOP ---------- */

function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
