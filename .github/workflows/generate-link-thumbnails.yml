name: Generate Link Thumbnails

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  thumbnails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install puppeteer

      - name: Generate thumbnails
        run: node .github/scripts/generate-thumbnails.js

      - name: Commit thumbnails
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add images/link-thumbnails
          git commit -m "Auto-update link thumbnails" || echo "No changes"
          git push
