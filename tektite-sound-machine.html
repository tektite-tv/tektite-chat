<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tektite's Sound Machine</title>

<style>

html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:"Courier New", monospace;
}

#overlay-container{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    border:none;
    overflow:hidden;
    z-index:1000;
}

/* main content iframe fills remaining space under overlay */
#main-frame{
    position:absolute;
    top:60px;
    left:0;
    width:100vw;
    height:calc(100vh - 60px);
    border:none;
    display:block;
}

</style>

</head>

<body>

<div id="overlay-container"></div>

<iframe id="main-frame" src="/tektite-sound-machine.html"></iframe>

<script>

fetch("overlay.html")
.then(res => res.text())
.then(html=>{
    document.getElementById("overlay-container").innerHTML = html;
});

function toggleSidebar(){
    const sidebar=document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

</script>

</body>
</html>
