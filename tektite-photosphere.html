<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>theinternetisdead.org</title>

<style>

body{
    margin:0;
    background:#111;
    font-family:"Courier New", monospace;
}

/* overlay container */
#overlay-container{
    position:relative;
    z-index:1000;
}

/* photosphere iframe BELOW overlay */
#photosphere-frame{
    display:block;
    width:100%;
    height:100vh;
    border:none;
}

</style>

</head>

<body>

<!-- overlay loads first -->
<div id="overlay-container"></div>

<!-- photosphere loads BELOW it -->
<iframe id="photosphere-frame" src="/photosphere.html"></iframe>

<script>

fetch("overlay.html")
.then(res => res.text())
.then(html=>{
    document.getElementById("overlay-container").innerHTML = html;
});

function toggleSidebar(){
    const sidebar=document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

</script>

</body>
</html>
