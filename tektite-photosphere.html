<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>theinternetisdead.org</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:"Courier New", monospace;
}

/* iframe that loads the photosphere */
#photosphere-frame{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    z-index:0;
}

/* overlay stays above the photosphere */
#overlay-container{
    position:relative;
    z-index:1000;
}
</style>

</head>

<body>

<div id="overlay-container"></div>

<!-- Photosphere content -->
<iframe id="photosphere-frame" src="/photosphere.html"></iframe>

<script>

fetch("overlay.html")
.then(res => res.text())
.then(html=>{
    document.getElementById("overlay-container").innerHTML = html;
});

function toggleSidebar(){
    const sidebar=document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

</script>

</body>
</html>
