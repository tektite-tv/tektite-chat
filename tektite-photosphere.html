<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>theinternetisdead.org</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#111;
    font-family:"Courier New", monospace;

    /* keep scrolling enabled, hide scrollbar */
    overflow:auto;
    scrollbar-width:none;        /* Firefox */
    -ms-overflow-style:none;     /* IE / old Edge */
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display:none;                /* Chrome / Safari / Opera */
}

/* overlay container */
#overlay-container{
    position:relative;
    z-index:1000;
}

/* photosphere iframe BELOW overlay */
#photosphere-frame{
    display:block;
    width:100%;
    height:100vh;
    border:none;
}
</style>

</head>

<body>

<!-- overlay loads first -->
<div id="overlay-container"></div>

<!-- photosphere loads BELOW it -->
<iframe id="photosphere-frame" src="/photosphere.html"></iframe>

<script>
fetch("overlay.html")
.then(res => res.text())
.then(html=>{
    document.getElementById("overlay-container").innerHTML = html;
});

function toggleSidebar(){
    const sidebar=document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}
</script>

</body>
</html>
