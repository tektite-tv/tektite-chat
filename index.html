<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>theinternetisdead.org</title>

<style>

body{
    margin:0;
    font-family:"Courier New", monospace;
    background:#111;
    color:white;
}

/* TOP BAR */

.topbar{
    height:60px;
    background:#3b0066;
    display:flex;
    align-items:center;
    padding-left:15px;
}

/* MENU BUTTON */

.hamburger{
    font-size:26px;
    cursor:pointer;
    user-select:none;
    color:lime;
    font-weight:bold;
}

/* LOGO */

.logo{
    margin-left:15px;
    height:40px;
}

.logo a{
    display:block;
    height:100%;
}

.logo img{
    height:100%;
    width:auto;
    display:block;
}

/* SIDEBAR */

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:#1a1a1a;
    transition:left 0.25s;
    box-shadow:2px 0 10px rgba(0,0,0,0.6);
}

.sidebar.open{
    left:0;
}

.sidebar .topbar{
    background:#3b0066;
}

</style>
</head>

<body>

<!-- MAIN TOP BAR -->

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png" alt="theinternetisdead.org">
</a>
</div>

</div>


<!-- SIDEBAR -->

<div id="sidebar" class="sidebar">

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">✕</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png" alt="theinternetisdead.org">
</a>
</div>

</div>

</div>


<script>

function toggleSidebar(){
    const sidebar=document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

</script>

</body>
</html>
