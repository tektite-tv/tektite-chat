<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>theinternetisdead.org</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
background:#111;
font-family:"Courier New", monospace;
}

#overlay-container{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
border:none;
overflow:hidden;
z-index:1000;
}

#main-frame{
position:absolute;
top:60px;
left:0;
width:100vw;
height:calc(100vh - 60px);
border:none;
}

/* MOBILE */

@media (max-width:700px){

#overlay-container{
height:52px;
}

#main-frame{
top:52px;
height:calc(100vh - 52px);
}

}

</style>

</head>

<body>

<div id="overlay-container"></div>

<iframe id="main-frame" src="/tektite-index.html"></iframe>

<script>

fetch("overlay.html")
.then(res=>res.text())
.then(html=>{
document.getElementById("overlay-container").innerHTML=html;
});

</script>

</body>
</html>
