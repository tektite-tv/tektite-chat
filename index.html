<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theinternetisdead.org</title>

<style>

/* ===== OVERLAY STYLES ===== */

body{
margin:0;
font-family:monospace;
background:black;
}

.topbar{
height:60px;
background:#3b0066;
display:flex;
align-items:center;
padding-left:15px;
padding-right:15px;
position:fixed;
top:0;
left:0;
width:100%;
z-index:10000;
}

.hamburger{
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
color:lime;
}

.logo{
margin-left:15px;
height:60px;
display:flex;
align-items:center;
}

.logo img{
height:40px;
}

.spacer{
flex:1;
}

.clock{
display:flex;
align-items:center;
}

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#1a1a1a;
transition:left .25s;
display:flex;
flex-direction:column;
z-index:20000;
}

.sidebar.open{
left:0;
}

.sidebar-menu{
padding:20px;
flex:1;
}

.sidebar-item{
margin-bottom:12px;
}

.sidebar-item a{
display:block;
background:#3b0066;
color:lime;
text-decoration:none;
border:2px solid black;
font-weight:bold;
text-align:center;
padding:10px;
}

.sidebar-preview{
width:100%;
aspect-ratio:16/9;
overflow:hidden;
max-height:0;
opacity:0;
transition:max-height .25s ease,opacity .25s ease;
background:black;
margin-top:10px;
}

.sidebar-preview img{
width:100%;
height:100%;
object-fit:cover;
}

.sidebar-item:hover .sidebar-preview{
max-height:200px;
opacity:1;
}

/* ===== PAGE OFFSET ===== */

#page-content{
margin-top:60px;
}

/* ===== ORIGINAL TEKTITE STYLES ===== */

html,body{
background:black;
color:#00ff00;
font-family:"Courier New",monospace;
overflow:auto;
scrollbar-width:none;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:6px 20px;
background:rgba(75,0,118,.5);
}

.channelHeader{
display:flex;
align-items:center;
gap:18px;
}

.channelLogo{
height:120px;
}

.controls{
display:flex;
align-items:center;
gap:12px;
}

button{
height:40px;
padding:0 16px;
border:2px solid #00ff00;
background:black;
color:#00ff00;
cursor:pointer;
}

#posts{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(var(--cols,3),1fr);
gap:20px;
}

.post{
border:2px solid #00ff00;
padding:10px;
cursor:pointer;
}

.thumb-grid{
aspect-ratio:16/9;
overflow:hidden;
border:2px solid #00ff00;
margin-bottom:10px;
}

.thumb-grid img{
width:100%;
height:100%;
object-fit:cover;
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
display:none;
flex-direction:column;
align-items:center;
z-index:99999;
}

#lightbox iframe{
width:min(48vw,640px);
aspect-ratio:16/9;
border:2px solid #00ff00;
}

</style>
</head>

<body>

<!-- ===== OVERLAY ===== -->

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

<div class="spacer"></div>

<div class="clock">
<iframe src="https://free.timeanddate.com/clock/iabiy632/n250/fn8/fs30/fc0f0/tct/pct/ftb/th2"
frameborder="0"
width="200"
height="36"></iframe>
</div>

</div>

<div id="sidebar" class="sidebar">

<div class="sidebar-menu">

<div class="sidebar-item">
<a href="/tektite-photosphere.html">
Tektite's Photosphere
<div class="sidebar-preview">
<img src="/images/link-thumbnails/tektite-photosphere.png">
</div>
</a>
</div>

<div class="sidebar-item">
<a href="/tektite-image-editor.html">
Tektite's Image Editor
<div class="sidebar-preview">
<img src="/images/link-thumbnails/tektite-image-editor.png">
</div>
</a>
</div>

<div class="sidebar-item">
<a href="/tektite-sound-machine.html">
Tektite's Sound Machine
<div class="sidebar-preview">
<img src="/images/link-thumbnails/tektite-sound-machine.png">
</div>
</a>
</div>

</div>

</div>

<!-- ===== MAIN PAGE ===== -->

<div id="page-content">

<header>

<div class="channelHeader">
<a href="https://youtube.com/@Honestly_Thomas" target="_blank">
<img src="/images/oldtube.png" class="channelLogo">
</a>
<a href="https://youtube.com/@Honestly_Thomas" target="_blank">
<div>Honestly Thomas (Tektite)</div>
</a>
</div>

<div class="controls">
<input id="videoSearch" placeholder="Search Videos...">
<button id="listBtn">LIST</button>
<button id="gridBtn">GRID</button>
<button id="modeBtn" disabled>2D</button>
</div>

</header>

<div id="posts" class="grid"></div>
<div id="status">LOADING VIDEO ARCHIVE...</div>

<button id="loadMore">Load More</button>

</div>

<div id="lightbox">
<div id="videoTitle"></div>
<iframe id="lightboxFrame"></iframe>
<div id="closeVideo">[CLOSE VIDEO]</div>
</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
}

/* your video loader unchanged */

async function loadPosts(){

try{

const r = await fetch("/data/videos.json");
const data = await r.json();

const posts = (data.entries || []).map(v => ({
id:v.id,
title:v.title,
thumb:`https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`
}));

document.getElementById("status").style.display="none";

posts.forEach(p=>{

const el=document.createElement("div");
el.className="post";

el.innerHTML=`
<div class="thumb-grid">
<img src="${p.thumb}">
</div>
<div>${p.title}</div>
`;

el.onclick=()=>{
document.getElementById("lightboxFrame").src=
"https://www.youtube.com/embed/"+p.id;

document.getElementById("lightbox").style.display="flex";
};

document.getElementById("posts").appendChild(el);

});

}catch(e){

document.getElementById("status").innerText="FAILED TO LOAD /data/videos.json";

}

}

document.getElementById("closeVideo").onclick=()=>{
document.getElementById("lightbox").style.display="none";
document.getElementById("lightboxFrame").src="";
};

document.addEventListener("DOMContentLoaded",loadPosts);

</script>

</body>
</html>
