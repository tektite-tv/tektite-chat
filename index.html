<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>theinternetisdead.org</title>

<style>

html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:"Courier New", monospace;
}

/* overlay iframe */
#overlay-frame{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    border:none;
    overflow:hidden;
    z-index:1000;
}

/* main site iframe */
#main-frame{
    position:absolute;
    top:60px;
    left:0;
    width:100vw;
    height:calc(100vh - 60px);
    border:none;
    display:block;
}

</style>

</head>

<body>

<iframe id="overlay-frame" src="/overlay.html"></iframe>

<iframe id="main-frame" src="/tektite-index.html"></iframe>

</body>
</html>
