<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FUBAR Video</title>
<style>
:root{--bg:#008080;--panel:#c0c0c0;--blue:#000080;--shadow-out:inset -2px -2px 0 #808080,inset 2px 2px 0 #ffffff,inset -4px -4px 0 #404040,inset 4px 4px 0 #dfdfdf;--shadow-in:inset -2px -2px 0 #ffffff,inset 2px 2px 0 #808080,inset -4px -4px 0 #dfdfdf,inset 4px 4px 0 #404040}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);font-family:Tahoma,Verdana,Arial}
.app{height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
.window{width:min(1180px,96vw);height:min(820px,94vh);background:var(--panel);box-shadow:var(--shadow-out);display:grid;grid-template-rows:30px 1fr 34px}
.titlebar{background:linear-gradient(90deg,#000080,#1084d0);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-weight:bold}
.workspace{position:relative;background:#333;display:flex;align-items:center;justify-content:center}
.drop-square{width:380px;aspect-ratio:1;background:var(--panel);box-shadow:var(--shadow-out);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;font-weight:bold;cursor:pointer;text-align:center}
.editor{position:absolute;inset:0;display:none;flex-direction:column}
.editor.ready{display:flex}
.viewer{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
canvas{max-width:100%;max-height:100%;background:#000}
.toolbar{background:var(--panel);padding:8px;display:flex;gap:8px;align-items:center;justify-content:center}
.btn{background:var(--panel);box-shadow:var(--shadow-out);border:none;padding:6px 10px;cursor:pointer}
.btn:active{box-shadow:var(--shadow-in)}
.statusbar{display:flex;align-items:center;background:var(--panel);border-top:1px solid #fff;font-size:12px;position:relative}
.statusbox{padding:4px 8px;flex:1}
/* NEW EXPORT LOADING BAR */
.exportbar{position:absolute;left:0;bottom:0;height:6px;width:100%;background:#1a1a1a}
.exportprogress{height:100%;width:0%;background:#00ff00;transition:width 0.1s linear}
</style>
</head>
<body>
<div class="app">
<div class="window">
<div class="titlebar">FUBAR Video Editor</div>
<div class="workspace" id="workspace">
<button class="drop-square" id="dropSquare">DROP VIDEO</button>
<div class="editor" id="editor">
<div class="viewer">
<canvas id="canvas"></canvas>
<video id="video" crossorigin="anonymous"></video>
</div>
<div class="toolbar">
<button class="btn" id="playBtn">Play</button>
<button class="btn" id="stopBtn">Stop</button>
<button class="btn" id="exportBtn">Export</button>
</div>
</div>
</div>
<div class="statusbar">
<div class="statusbox" id="statusText">Waiting for video.</div>
<div class="exportbar"><div class="exportprogress" id="exportProgress"></div></div>
</div>
</div>
</div>

<input type="file" id="fileInput" accept="video/*" hidden>

<script>
const dropSquare=document.getElementById("dropSquare")
const fileInput=document.getElementById("fileInput")
const editor=document.getElementById("editor")
const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
const playBtn=document.getElementById("playBtn")
const stopBtn=document.getElementById("stopBtn")
const exportBtn=document.getElementById("exportBtn")
const statusText=document.getElementById("statusText")
const exportProgress=document.getElementById("exportProgress")

let url=null
let recorder=null
let chunks=[]

function draw(){
if(video.paused)return
ctx.drawImage(video,0,0,canvas.width,canvas.height)
requestAnimationFrame(draw)
}

async function loadFile(file){
if(url)URL.revokeObjectURL(url)
url=URL.createObjectURL(file)
video.src=url
await video.play().catch(()=>{})
video.pause()
canvas.width=video.videoWidth
canvas.height=video.videoHeight
editor.classList.add("ready")
dropSquare.style.display="none"
statusText.textContent="Loaded "+file.name
ctx.drawImage(video,0,0,canvas.width,canvas.height)
}

dropSquare.onclick=()=>fileInput.click()
fileInput.onchange=e=>loadFile(e.target.files[0])

playBtn.onclick=()=>{video.play();draw()}
stopBtn.onclick=()=>{video.pause();video.currentTime=0}

exportBtn.onclick=async()=>{
if(!video.src)return
chunks=[]
exportProgress.style.width="0%"
statusText.textContent="Exporting..."

const stream=canvas.captureStream(30)
recorder=new MediaRecorder(stream,{mimeType:"video/webm"})

recorder.ondataavailable=e=>chunks.push(e.data)
recorder.onstop=()=>{
const blob=new Blob(chunks,{type:"video/webm"})
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="fubar-glitched.webm"
a.click()
statusText.textContent="Export complete"
exportProgress.style.width="100%"
}

recorder.start()
video.currentTime=0
await video.play()

const duration=video.duration

function updateProgress(){
const pct=(video.currentTime/duration)*100
exportProgress.style.width=pct+"%"
if(!video.paused)requestAnimationFrame(updateProgress)
}

updateProgress()

await new Promise(r=>video.onended=r)
recorder.stop()
video.pause()
}
</script>
</body>
</html>
