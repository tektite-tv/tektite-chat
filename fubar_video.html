<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUBAR Video</title>
  <style>
    :root {
      --bg: #008080;
      --panel: #c0c0c0;
      --panel-dark: #808080;
      --panel-light: #ffffff;
      --panel-mid: #dfdfdf;
      --text: #111;
      --blue: #000080;
      --red: #a00000;
      --green: #007a3d;
      --shadow-out: inset -2px -2px 0 #808080, inset 2px 2px 0 #ffffff, inset -4px -4px 0 #404040, inset 4px 4px 0 #dfdfdf;
      --shadow-in: inset -2px -2px 0 #ffffff, inset 2px 2px 0 #808080, inset -4px -4px 0 #dfdfdf, inset 4px 4px 0 #404040;
      --title-grad: linear-gradient(90deg, #000080, #1084d0);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Tahoma, Verdana, Arial, sans-serif;
      color: var(--text);
      user-select: none;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .window {
      width: min(1180px, 96vw);
      height: min(820px, 94vh);
      background: var(--panel);
      box-shadow: var(--shadow-out);
      display: grid;
      grid-template-rows: 30px 1fr 34px;
      position: relative;
    }

    .titlebar {
      background: var(--title-grad);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      font-weight: bold;
      letter-spacing: 0.3px;
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .app-icon {
      width: 16px;
      height: 16px;
      background: conic-gradient(from 0deg, #ff0, #f0f, #0ff, #ff0);
      border: 1px solid #111;
      flex: 0 0 auto;
    }

    .title-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .win-buttons {
      display: flex;
      gap: 4px;
    }

    .win-btn {
      width: 22px;
      height: 18px;
      border: none;
      background: var(--panel);
      box-shadow: var(--shadow-out);
      display: grid;
      place-items: center;
      padding: 0;
      cursor: pointer;
      color: #111;
      font-weight: bold;
    }

    .win-btn:active,
    .menu-btn:active,
    .btn:active,
    .transport-btn:active,
    .drop-square.pressed {
      box-shadow: var(--shadow-in);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr;
      position: relative;
      min-height: 0;
      background: #3a3a3a;
    }

    .workspace {
      position: relative;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.04) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.04) 75%),
        linear-gradient(45deg, rgba(255,255,255,0.04) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.04) 75%);
      background-size: 28px 28px;
      background-position: 0 0, 14px 14px;
      overflow: hidden;
    }

    .drop-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 4;
      transition: opacity 180ms ease;
    }

    .drop-wrap.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .drop-square {
      width: min(420px, 72vw);
      aspect-ratio: 1 / 1;
      background: var(--panel);
      box-shadow: var(--shadow-out);
      border: none;
      padding: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 18px;
      transition: transform 120ms ease, background 120ms ease;
    }

    .drop-square:hover {
      transform: translateY(-1px);
      background: #d7d7d7;
    }

    .drop-square.dragover {
      background: #d9ffd9;
      outline: 3px dashed var(--blue);
      outline-offset: -14px;
    }

    .drop-icon {
      width: 76px;
      height: 76px;
      background: #fff;
      box-shadow: var(--shadow-in);
      position: relative;
    }

    .drop-icon::before,
    .drop-icon::after {
      content: "";
      position: absolute;
      background: var(--blue);
    }

    .drop-icon::before {
      width: 42px;
      height: 8px;
      left: 17px;
      top: 34px;
    }

    .drop-icon::after {
      width: 8px;
      height: 42px;
      left: 34px;
      top: 17px;
    }

    .drop-title {
      font-size: 28px;
      font-weight: bold;
      line-height: 1.1;
    }

    .drop-sub {
      font-size: 15px;
      max-width: 260px;
      line-height: 1.35;
    }

    .editor {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
      min-height: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    .editor.ready {
      opacity: 1;
      pointer-events: auto;
    }

    .viewer {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      overflow: hidden;
      background: #111;
    }

    canvas {
      max-width: 100%;
      max-height: 100%;
      image-rendering: auto;
      background: #000;
      box-shadow: 0 0 0 2px #000, 0 0 0 4px #5a5a5a;
    }

    .hud {
      position: absolute;
      left: 10px;
      top: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      z-index: 5;
    }

    .chip {
      background: rgba(192,192,192,0.92);
      color: #111;
      padding: 5px 8px;
      box-shadow: var(--shadow-out);
      font-size: 12px;
      white-space: nowrap;
    }

    .menu-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 300px;
      background: var(--panel);
      box-shadow: var(--shadow-out);
      z-index: 8;
      padding: 10px;
      display: none;
      max-height: calc(100% - 24px);
      overflow: auto;
    }

    .menu-panel.open {
      display: block;
    }

    .menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .menu-title {
      font-weight: bold;
      font-size: 15px;
    }

    .section {
      background: #d4d0c8;
      box-shadow: var(--shadow-in);
      padding: 10px;
      margin-bottom: 10px;
    }

    .section h3 {
      margin: 0 0 8px;
      font-size: 13px;
      text-transform: uppercase;
      color: #222;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }

    .toolbar {
      background: var(--panel);
      box-shadow: inset 0 2px 0 #fff;
      padding: 8px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .left-controls,
    .right-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .transport {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .menu-btn,
    .btn,
    .transport-btn {
      border: none;
      background: var(--panel);
      box-shadow: var(--shadow-out);
      padding: 6px 10px;
      cursor: pointer;
      min-height: 28px;
    }

    .menu-btn {
      width: 36px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: bold;
    }

    .transport-btn {
      min-width: 56px;
    }

    .btn.primary {
      color: #fff;
      background: var(--blue);
      box-shadow: inset -2px -2px 0 #001f4d, inset 2px 2px 0 #7aa7ff, inset -4px -4px 0 #000, inset 4px 4px 0 #d6e4ff;
    }

    .timeline-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      width: 100%;
    }

    .timeline {
      width: 100%;
      min-width: 120px;
    }

    .statusbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      background: var(--panel);
      border-top: 1px solid #fff;
      font-size: 12px;
    }

    .statusbox {
      box-shadow: var(--shadow-in);
      padding: 3px 8px;
      min-height: 20px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .grow {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hidden-input,
    video {
      display: none;
    }

    .exporting {
      color: var(--red);
      font-weight: bold;
      animation: blink 0.85s steps(2, start) infinite;
    }

    @keyframes blink {
      to { opacity: 0.4; }
    }

    @media (max-width: 920px) {
      .window {
        width: 100vw;
        height: 100vh;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .left-controls,
      .right-controls,
      .transport {
        justify-content: center;
      }

      .menu-panel {
        width: min(320px, calc(100vw - 24px));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="window">
      <div class="titlebar">
        <div class="titlebar-left">
          <div class="app-icon" aria-hidden="true"></div>
          <div class="title-text" id="titleText">FUBAR Video Editor</div>
        </div>
        <div class="win-buttons" aria-hidden="true">
          <button class="win-btn" type="button">_</button>
          <button class="win-btn" type="button">□</button>
          <button class="win-btn" type="button">✕</button>
        </div>
      </div>

      <div class="main">
        <div class="workspace" id="workspace">
          <div class="drop-wrap" id="dropWrap">
            <button class="drop-square" id="dropSquare" type="button">
              <div class="drop-icon" aria-hidden="true"></div>
              <div class="drop-title">DROP VIDEO</div>
              <div class="drop-sub">Drag and drop a video file here or click to browse your drive like a responsible little chaos goblin.</div>
            </button>
          </div>

          <div class="editor" id="editor">
            <div class="viewer">
              <div class="hud">
                <div class="chip" id="chipFile">NO FILE</div>
                <div class="chip" id="chipFx">FX: Clean</div>
                <div class="chip" id="chipRes">0 × 0</div>
              </div>

              <button class="menu-btn" id="menuButton" type="button" style="position:absolute;top:12px;right:12px;z-index:9;">☰</button>

              <div class="menu-panel" id="menuPanel">
                <div class="menu-head">
                  <div class="menu-title">Distortion Rack</div>
                  <button class="btn" id="resetFxBtn" type="button">Reset FX</button>
                </div>

                <div class="section">
                  <h3>Basic Damage</h3>
                  <div class="row"><label for="brightness">Brightness</label><span id="brightnessVal">100%</span></div>
                  <input id="brightness" type="range" min="0" max="200" value="100" />
                  <div class="row"><label for="contrast">Contrast</label><span id="contrastVal">100%</span></div>
                  <input id="contrast" type="range" min="0" max="300" value="100" />
                  <div class="row"><label for="saturate">Saturation</label><span id="saturateVal">100%</span></div>
                  <input id="saturate" type="range" min="0" max="400" value="100" />
                  <div class="row"><label for="hue">Hue Shift</label><span id="hueVal">0°</span></div>
                  <input id="hue" type="range" min="0" max="360" value="0" />
                  <div class="row"><label for="blur">Blur</label><span id="blurVal">0px</span></div>
                  <input id="blur" type="range" min="0" max="20" step="0.1" value="0" />
                </div>

                <div class="section">
                  <h3>Glitch Sauce</h3>
                  <div class="row"><label for="glitchAmount">Slice Offset</label><span id="glitchAmountVal">0</span></div>
                  <input id="glitchAmount" type="range" min="0" max="80" value="0" />
                  <div class="row"><label for="noiseAmount">Noise</label><span id="noiseAmountVal">0</span></div>
                  <input id="noiseAmount" type="range" min="0" max="100" value="0" />
                  <div class="row"><label for="pixelate">Pixelate</label><span id="pixelateVal">1x</span></div>
                  <input id="pixelate" type="range" min="1" max="24" value="1" />
                  <div class="row"><label for="scanlines">Scanlines</label><span id="scanlinesVal">0</span></div>
                  <input id="scanlines" type="range" min="0" max="100" value="0" />
                  <div class="row"><label for="channelSplit">RGB Split</label><span id="channelSplitVal">0</span></div>
                  <input id="channelSplit" type="range" min="0" max="25" value="0" />
                </div>

                <div class="section">
                  <h3>Chaos Toggles</h3>
                  <div class="row"><label for="invertToggle">Invert</label><input id="invertToggle" type="checkbox" /></div>
                  <div class="row"><label for="mirrorToggle">Mirror</label><input id="mirrorToggle" type="checkbox" /></div>
                  <div class="row"><label for="vhsToggle">VHS Jitter</label><input id="vhsToggle" type="checkbox" /></div>
                  <div class="row"><label for="stutterToggle">Frame Stutter</label><input id="stutterToggle" type="checkbox" /></div>
                </div>
              </div>

              <canvas id="canvas" width="1280" height="720"></canvas>
              <video id="sourceVideo" playsinline crossorigin="anonymous"></video>
            </div>

            <div class="toolbar">
              <div class="left-controls">
                <button class="menu-btn" id="menuButtonBottom" type="button">☰</button>
                <button class="btn" id="loadAnotherBtn" type="button">Load Video</button>
                <button class="btn primary" id="exportBtn" type="button">Export Video</button>
              </div>

              <div class="transport">
                <button class="transport-btn" id="playPauseBtn" type="button">Play</button>
                <button class="transport-btn" id="stopBtn" type="button">Stop</button>
                <button class="transport-btn" id="muteBtn" type="button">Mute</button>
                <button class="transport-btn" id="loopBtn" type="button">Loop: Off</button>
                <div class="timeline-wrap">
                  <span id="timeCurrent">00:00</span>
                  <input class="timeline" id="timeline" type="range" min="0" max="1000" value="0" />
                  <span id="timeTotal">00:00</span>
                </div>
              </div>

              <div class="right-controls">
                <button class="btn" id="fitBtn" type="button">Fit</button>
                <button class="btn" id="actualBtn" type="button">100%</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="statusbar">
        <div class="statusbox grow" id="statusText">Waiting for video sacrifice.</div>
        <div class="statusbox" id="statusFx">FX Ready</div>
        <div class="statusbox" id="statusExport">Idle</div>
      </div>
    </div>
  </div>

  <input class="hidden-input" id="fileInput" type="file" accept="video/*" />

  <script>
    const dropWrap = document.getElementById('dropWrap');
    const dropSquare = document.getElementById('dropSquare');
    const workspace = document.getElementById('workspace');
    const fileInput = document.getElementById('fileInput');
    const editor = document.getElementById('editor');
    const sourceVideo = document.getElementById('sourceVideo');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const titleText = document.getElementById('titleText');
    const statusText = document.getElementById('statusText');
    const statusFx = document.getElementById('statusFx');
    const statusExport = document.getElementById('statusExport');
    const chipFile = document.getElementById('chipFile');
    const chipFx = document.getElementById('chipFx');
    const chipRes = document.getElementById('chipRes');

    const playPauseBtn = document.getElementById('playPauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const muteBtn = document.getElementById('muteBtn');
    const loopBtn = document.getElementById('loopBtn');
    const timeline = document.getElementById('timeline');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');
    const exportBtn = document.getElementById('exportBtn');
    const loadAnotherBtn = document.getElementById('loadAnotherBtn');
    const fitBtn = document.getElementById('fitBtn');
    const actualBtn = document.getElementById('actualBtn');
    const menuPanel = document.getElementById('menuPanel');
    const menuButton = document.getElementById('menuButton');
    const menuButtonBottom = document.getElementById('menuButtonBottom');
    const resetFxBtn = document.getElementById('resetFxBtn');

    let objectUrl = null;
    let animationId = null;
    let recorder = null;
    let recordedChunks = [];
    let exportAudioContext = null;
    let currentScaleMode = 'fit';
    let lastFrameData = null;
    let lastStutterTime = 0;
    let dragging = false;

    const effects = {
      brightness: 100,
      contrast: 100,
      saturate: 100,
      hue: 0,
      blur: 0,
      glitchAmount: 0,
      noiseAmount: 0,
      pixelate: 1,
      scanlines: 0,
      channelSplit: 0,
      invertToggle: false,
      mirrorToggle: false,
      vhsToggle: false,
      stutterToggle: false,
    };

    const sliderIds = [
      'brightness', 'contrast', 'saturate', 'hue', 'blur',
      'glitchAmount', 'noiseAmount', 'pixelate', 'scanlines', 'channelSplit'
    ];

    const toggleIds = ['invertToggle', 'mirrorToggle', 'vhsToggle', 'stutterToggle'];

    function fmtTime(sec) {
      if (!isFinite(sec)) return '00:00';
      const s = Math.max(0, Math.floor(sec));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
    }

    function updateValueLabels() {
      document.getElementById('brightnessVal').textContent = effects.brightness + '%';
      document.getElementById('contrastVal').textContent = effects.contrast + '%';
      document.getElementById('saturateVal').textContent = effects.saturate + '%';
      document.getElementById('hueVal').textContent = effects.hue + '°';
      document.getElementById('blurVal').textContent = Number(effects.blur).toFixed(1).replace('.0', '') + 'px';
      document.getElementById('glitchAmountVal').textContent = effects.glitchAmount;
      document.getElementById('noiseAmountVal').textContent = effects.noiseAmount;
      document.getElementById('pixelateVal').textContent = effects.pixelate + 'x';
      document.getElementById('scanlinesVal').textContent = effects.scanlines;
      document.getElementById('channelSplitVal').textContent = effects.channelSplit;
    }

    function summarizeFx() {
      const active = [];
      if (effects.glitchAmount > 0) active.push('Slice');
      if (effects.noiseAmount > 0) active.push('Noise');
      if (effects.pixelate > 1) active.push('Pixel');
      if (effects.scanlines > 0) active.push('Scan');
      if (effects.channelSplit > 0) active.push('RGB');
      if (effects.hue > 0) active.push('Hue');
      if (effects.blur > 0) active.push('Blur');
      if (effects.invertToggle) active.push('Invert');
      if (effects.mirrorToggle) active.push('Mirror');
      if (effects.vhsToggle) active.push('VHS');
      if (effects.stutterToggle) active.push('Stutter');
      const label = active.length ? active.join(' + ') : 'Clean';
      chipFx.textContent = 'FX: ' + label;
      statusFx.textContent = label;
    }

    function applyUiEffectState() {
      sliderIds.forEach(id => {
        const el = document.getElementById(id);
        effects[id] = Number(el.value);
      });
      toggleIds.forEach(id => {
        const el = document.getElementById(id);
        effects[id] = el.checked;
      });
      updateValueLabels();
      summarizeFx();
    }

    function resetEffects() {
      const defaults = {
        brightness: 100,
        contrast: 100,
        saturate: 100,
        hue: 0,
        blur: 0,
        glitchAmount: 0,
        noiseAmount: 0,
        pixelate: 1,
        scanlines: 0,
        channelSplit: 0,
        invertToggle: false,
        mirrorToggle: false,
        vhsToggle: false,
        stutterToggle: false,
      };
      Object.entries(defaults).forEach(([id, value]) => {
        const el = document.getElementById(id);
        if (el.type === 'checkbox') el.checked = value;
        else el.value = value;
      });
      applyUiEffectState();
      statusText.textContent = 'Effects reset. Humanity remains questionable.';
    }

    function setCanvasSizeFromVideo() {
      const w = sourceVideo.videoWidth || 1280;
      const h = sourceVideo.videoHeight || 720;
      canvas.width = w;
      canvas.height = h;
      chipRes.textContent = `${w} × ${h}`;
      timeTotal.textContent = fmtTime(sourceVideo.duration);
    }

    function fitCanvasDisplay() {
      canvas.style.width = currentScaleMode === 'actual' ? canvas.width + 'px' : '';
      canvas.style.height = currentScaleMode === 'actual' ? canvas.height + 'px' : '';
      canvas.style.maxWidth = currentScaleMode === 'actual' ? 'none' : '100%';
      canvas.style.maxHeight = currentScaleMode === 'actual' ? 'none' : '100%';
    }

    function buildCanvasFilter() {
      const parts = [
        `brightness(${effects.brightness}%)`,
        `contrast(${effects.contrast}%)`,
        `saturate(${effects.saturate}%)`,
        `hue-rotate(${effects.hue}deg)`,
        `blur(${effects.blur}px)`
      ];
      if (effects.invertToggle) parts.push('invert(1)');
      return parts.join(' ');
    }

    function drawVideoFrame() {
      if (!sourceVideo.src) return;

      const w = canvas.width;
      const h = canvas.height;
      const now = performance.now();

      if (effects.stutterToggle && lastFrameData && now - lastStutterTime < 140) {
        ctx.putImageData(lastFrameData, 0, 0);
        return;
      }
      if (effects.stutterToggle && Math.random() < 0.14) {
        lastStutterTime = now;
      }

      ctx.save();
      ctx.clearRect(0, 0, w, h);
      ctx.filter = buildCanvasFilter();

      if (effects.mirrorToggle) {
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
      }

      let jitterX = 0;
      let jitterY = 0;
      if (effects.vhsToggle) {
        jitterX = (Math.random() - 0.5) * 8;
        jitterY = (Math.random() - 0.5) * 3;
      }

      const px = Math.max(1, effects.pixelate);
      if (px > 1) {
        const sw = Math.max(1, Math.floor(w / px));
        const sh = Math.max(1, Math.floor(h / px));
        const off = document.createElement('canvas');
        off.width = sw;
        off.height = sh;
        const octx = off.getContext('2d');
        octx.imageSmoothingEnabled = true;
        octx.filter = buildCanvasFilter();
        octx.drawImage(sourceVideo, 0, 0, sw, sh);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(off, 0 + jitterX, 0 + jitterY, w, h);
        ctx.imageSmoothingEnabled = true;
      } else {
        ctx.drawImage(sourceVideo, jitterX, jitterY, w, h);
      }

      ctx.restore();

      if (effects.channelSplit > 0) {
        const split = effects.channelSplit;
        ctx.globalCompositeOperation = 'screen';
        ctx.drawImage(canvas, split, 0);
        ctx.drawImage(canvas, -split, 0);
        ctx.globalCompositeOperation = 'source-over';
      }

      if (effects.glitchAmount > 0) {
        const slices = Math.max(1, Math.floor(effects.glitchAmount / 6));
        for (let i = 0; i < slices; i++) {
          const sliceY = Math.floor(Math.random() * h);
          const sliceH = Math.max(4, Math.floor(Math.random() * (h * 0.08)));
          const dx = (Math.random() - 0.5) * effects.glitchAmount * 2;
          ctx.drawImage(canvas, 0, sliceY, w, sliceH, dx, sliceY, w, sliceH);
        }
      }

      if (effects.scanlines > 0) {
        ctx.save();
        ctx.globalAlpha = Math.min(0.85, effects.scanlines / 120);
        for (let y = 0; y < h; y += 3) {
          ctx.fillStyle = (y / 3) % 2 === 0 ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.03)';
          ctx.fillRect(0, y, w, 1);
        }
        ctx.restore();
      }

      if (effects.noiseAmount > 0) {
        const imageData = ctx.getImageData(0, 0, w, h);
        const d = imageData.data;
        const strength = effects.noiseAmount * 1.75;
        for (let i = 0; i < d.length; i += 4) {
          const n = (Math.random() - 0.5) * strength;
          d[i] = Math.max(0, Math.min(255, d[i] + n));
          d[i + 1] = Math.max(0, Math.min(255, d[i + 1] + n));
          d[i + 2] = Math.max(0, Math.min(255, d[i + 2] + n));
        }
        ctx.putImageData(imageData, 0, 0);
      }

      try {
        lastFrameData = ctx.getImageData(0, 0, w, h);
      } catch (err) {
        lastFrameData = null;
      }
    }

    function renderLoop() {
      drawVideoFrame();
      if (!sourceVideo.paused || recorder?.state === 'recording') {
        animationId = requestAnimationFrame(renderLoop);
      } else {
        animationId = null;
      }
    }

    function ensureRenderLoop() {
      if (!animationId) animationId = requestAnimationFrame(renderLoop);
    }

    function updateTransportUi() {
      playPauseBtn.textContent = sourceVideo.paused ? 'Play' : 'Pause';
      muteBtn.textContent = sourceVideo.muted ? 'Unmute' : 'Mute';
      loopBtn.textContent = 'Loop: ' + (sourceVideo.loop ? 'On' : 'Off');
      timeCurrent.textContent = fmtTime(sourceVideo.currentTime);
      if (isFinite(sourceVideo.duration) && sourceVideo.duration > 0) {
        timeline.value = Math.floor((sourceVideo.currentTime / sourceVideo.duration) * 1000);
      } else {
        timeline.value = 0;
      }
    }

    function showEditor(fileName) {
      dropWrap.classList.add('hidden');
      editor.classList.add('ready');
      chipFile.textContent = fileName.toUpperCase();
      titleText.textContent = 'FUBAR Video Editor - ' + fileName;
      statusText.textContent = 'Loaded ' + fileName;
    }

    async function loadFile(file) {
      if (!file || !file.type.startsWith('video/')) {
        statusText.textContent = 'That is not a video. Even machines have limits.';
        return;
      }

      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = URL.createObjectURL(file);
      sourceVideo.src = objectUrl;
      sourceVideo.load();
      showEditor(file.name);

      await new Promise((resolve, reject) => {
        sourceVideo.onloadedmetadata = () => resolve();
        sourceVideo.onerror = () => reject(new Error('Video failed to load.'));
      }).catch(() => {
        statusText.textContent = 'Failed to load video.';
      });

      setCanvasSizeFromVideo();
      fitCanvasDisplay();
      sourceVideo.currentTime = 0;
      sourceVideo.pause();
      drawVideoFrame();
      updateTransportUi();
      summarizeFx();
    }

    async function exportVideo() {
      if (!sourceVideo.src) {
        statusText.textContent = 'Load a video first. Revolutionary concept, I know.';
        return;
      }
      if (recorder && recorder.state === 'recording') return;

      const mimeCandidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm'
      ];
      const mimeType = mimeCandidates.find(type => MediaRecorder.isTypeSupported(type)) || '';

      recordedChunks = [];
      const fps = 30;
      const canvasStream = canvas.captureStream(fps);
      let tracks = [...canvasStream.getVideoTracks()];

      try {
        const videoStream = sourceVideo.captureStream ? sourceVideo.captureStream() : (sourceVideo.mozCaptureStream ? sourceVideo.mozCaptureStream() : null);
        if (videoStream) {
          for (const audioTrack of videoStream.getAudioTracks()) {
            tracks.push(audioTrack);
          }
        }
      } catch (err) {
        console.warn('Audio capture unavailable', err);
      }

      const mixedStream = new MediaStream(tracks);
      recorder = new MediaRecorder(mixedStream, mimeType ? { mimeType } : undefined);

      recorder.ondataavailable = e => {
        if (e.data && e.data.size > 0) recordedChunks.push(e.data);
      };

      recorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: mimeType || 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const base = (chipFile.textContent || 'fubar-video').replace(/\.[^.]+$/, '').toLowerCase().replace(/[^a-z0-9_-]+/g, '-');
        a.href = url;
        a.download = `${base || 'fubar-video'}-glitched.webm`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 4000);
        statusExport.textContent = 'Saved';
        statusExport.classList.remove('exporting');
        statusText.textContent = 'Export finished. File emitted into the void successfully.';
      };

      recorder.start(250);
      statusExport.textContent = 'Recording';
      statusExport.classList.add('exporting');
      statusText.textContent = 'Exporting video with current effects...';

      const wasPaused = sourceVideo.paused;
      sourceVideo.currentTime = 0;
      await sourceVideo.play().catch(() => {});
      updateTransportUi();
      ensureRenderLoop();

      await new Promise(resolve => {
        const cleanup = () => {
          sourceVideo.removeEventListener('ended', cleanup);
          resolve();
        };
        sourceVideo.addEventListener('ended', cleanup, { once: true });
      });

      if (recorder.state === 'recording') recorder.stop();
      sourceVideo.pause();
      sourceVideo.currentTime = 0;
      drawVideoFrame();
      updateTransportUi();

      if (!wasPaused) {
        // no resume after export on purpose
      }
    }

    dropSquare.addEventListener('click', () => fileInput.click());
    loadAnotherBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

    ['dragenter', 'dragover'].forEach(type => {
      workspace.addEventListener(type, e => {
        e.preventDefault();
        dragging = true;
        dropWrap.classList.remove('hidden');
        dropSquare.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach(type => {
      workspace.addEventListener(type, e => {
        e.preventDefault();
        dragging = false;
        dropSquare.classList.remove('dragover');
        if (!sourceVideo.src) dropWrap.classList.remove('hidden');
        else dropWrap.classList.add('hidden');
      });
    });

    workspace.addEventListener('drop', e => {
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      loadFile(file);
    });

    playPauseBtn.addEventListener('click', async () => {
      if (!sourceVideo.src) return;
      if (sourceVideo.paused) {
        await sourceVideo.play().catch(() => {});
        ensureRenderLoop();
      } else {
        sourceVideo.pause();
      }
      updateTransportUi();
      drawVideoFrame();
    });

    stopBtn.addEventListener('click', () => {
      if (!sourceVideo.src) return;
      sourceVideo.pause();
      sourceVideo.currentTime = 0;
      updateTransportUi();
      drawVideoFrame();
    });

    muteBtn.addEventListener('click', () => {
      sourceVideo.muted = !sourceVideo.muted;
      updateTransportUi();
    });

    loopBtn.addEventListener('click', () => {
      sourceVideo.loop = !sourceVideo.loop;
      updateTransportUi();
    });

    timeline.addEventListener('input', () => {
      if (!isFinite(sourceVideo.duration) || sourceVideo.duration <= 0) return;
      const pct = Number(timeline.value) / 1000;
      sourceVideo.currentTime = pct * sourceVideo.duration;
      updateTransportUi();
      drawVideoFrame();
    });

    sourceVideo.addEventListener('timeupdate', updateTransportUi);
    sourceVideo.addEventListener('play', () => { updateTransportUi(); ensureRenderLoop(); });
    sourceVideo.addEventListener('pause', () => { updateTransportUi(); drawVideoFrame(); });
    sourceVideo.addEventListener('ended', () => { updateTransportUi(); drawVideoFrame(); });

    exportBtn.addEventListener('click', exportVideo);

    fitBtn.addEventListener('click', () => {
      currentScaleMode = 'fit';
      fitCanvasDisplay();
      statusText.textContent = 'Preview scaled to fit.';
    });

    actualBtn.addEventListener('click', () => {
      currentScaleMode = 'actual';
      fitCanvasDisplay();
      statusText.textContent = 'Preview set to 100%. Enjoy your enormous pixels.';
    });

    function toggleMenu() {
      menuPanel.classList.toggle('open');
    }

    menuButton.addEventListener('click', toggleMenu);
    menuButtonBottom.addEventListener('click', toggleMenu);
    resetFxBtn.addEventListener('click', resetEffects);

    sliderIds.forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        applyUiEffectState();
        drawVideoFrame();
      });
    });

    toggleIds.forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        applyUiEffectState();
        drawVideoFrame();
      });
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && editor.classList.contains('ready')) {
        e.preventDefault();
        playPauseBtn.click();
      }
      if (e.key.toLowerCase() === 'm' && editor.classList.contains('ready')) muteBtn.click();
      if (e.key.toLowerCase() === 'e' && (e.ctrlKey || e.metaKey) && editor.classList.contains('ready')) {
        e.preventDefault();
        exportBtn.click();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (objectUrl) URL.revokeObjectURL(objectUrl);
    });

    applyUiEffectState();
    drawVideoFrame();
  </script>
</body>
</html>
