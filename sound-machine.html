<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tektite's Sound Machine</title>
<style>
:root{
  --ui-top:10px;
  --hamburger-size:24px;
  --ui-bottom: calc(100vh - (var(--ui-top) + var(--hamburger-size)));
}
#topBar{
position:fixed;
top:0;
left:0;
width:100%;
height:48px;
background:black;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
box-sizing:border-box;
z-index:40;
}
#settingsButton{color:#00ff00;font-size:18px;cursor:pointer;}
#topTitle{position:absolute;left:50%;transform:translateX(-50%);color:#00ff00;font-size:20px;}
#recordIndicator{color:#00ff00;font-size:16px;display:none;}
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:monospace;
  color:#00ff00;
}



/* Center menu */
#menuOverlay {
  z-index:50;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}

#menuBox {
  border:2px solid #00ff00;
  padding:30px;
  width:320px;
  text-align:left;
  background: rgba(0,255,0,0.25);
  box-shadow:0 0 20px #00ff00;
  animation:glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow:0 0 10px #00ff00; }
  to { box-shadow:0 0 30px #00ff00; }
}

label {
  display:block;
  margin:10px 0;
  cursor:pointer;
}

button {
  margin-top:15px;
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
  padding:8px 12px;
  cursor:pointer;
}

button:hover {
  background:#003300;
}

/* Recording indicator */
#recordIndicator {
  position:absolute;
  top:10px;
  right:20px;
  display:none;
  align-items:center;
  font-size:18px;
  line-height:1;
  z-index:25;
}

#recDot {
  width:18px;
  height:18px;
  background:red;
  border-radius:50%;
  margin-right:10px;
  margin-bottom:1px;
  animation:blink 1s infinite;
}

@keyframes blink {
  0% { opacity:1; }
  50% { opacity:0.2; }
  100% { opacity:1; }
}

#recText {
  color:red;
}

canvas { 
  display:block;
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}


#topTitle{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:20px;
  line-height:1;
  font-family:monospace;
  z-index:30;
}

#muteButton{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:#00ff00;
  border:1px solid #00ff00;
  padding:6px 16px;
  cursor:pointer;
  font-family:monospace;
  z-index:30;
}

#muteButton:hover{
  background:#003300;
}

#recTimer{
  position:absolute;
  bottom:15px;
  right:20px;
  color:cyan;
  font-family:monospace;
  font-size:16px;
  display:none;
  z-index:30;
}


#scopeGrid{
position:fixed;
inset:0;
z-index:0;
pointer-events:none;
background:#001010;
background-image:
repeating-linear-gradient(0deg, rgba(0,255,0,0.2) 0px, rgba(0,255,0,0.2) 1px, transparent 1px, transparent 40px),
repeating-linear-gradient(90deg, rgba(0,255,0,0.2) 0px, rgba(0,255,0,0.2) 1px, transparent 1px, transparent 40px);
}
canvas{
position:absolute;
z-index:1;
background:transparent !important;
}

</style>
</head>
<body>
<div id='scopeGrid'></div>

<div id="topBar">
<div id="settingsButton" onclick="toggleMenu()">Esc = Settings</div>
<div id="topTitle">Tektite's Sound Machine</div>
<div id="recordIndicator">
  <div id="recDot"></div>
  <div id="recText">Recording<span id="dots"></span></div>
</div>
</div>

<div id="menuOverlay">
  <div id="menuBox">
    <h3>CHAOS OPTIONS</h3>
    <label><input type="checkbox" onchange="toggle('pink', this.checked)"> Pink Noise</label>
    <label><input type="checkbox" onchange="toggle('drone', this.checked)"> Drone</label>
    <label><input type="checkbox" onchange="toggle('synth', this.checked)"> Synth</label>
    <label><input type="checkbox" onchange="toggle('glitch', this.checked)"> Glitch</label>
    <label><input type="checkbox" onchange="toggle('chirps', this.checked)"> Chirps</label>
    <button onclick="toggleRecord()" id="recBtn">Start Recording</button>
  </div>
</div>

<canvas id="viz"></canvas>

<div id="muteButton">Mute</div>
<div id="recTimer">00:00</div>

<script>
const ctx = new (window.AudioContext||window.webkitAudioContext)();
const analyser = ctx.createAnalyser();
analyser.fftSize = 2048;

const master = ctx.createGain();
master.gain.value = 0.7;
master.connect(analyser).connect(ctx.destination);

let mouseX=0.5, mouseY=0.5;
document.body.addEventListener("mousemove", e=>{
  mouseX = e.clientX/window.innerWidth;
  mouseY = e.clientY/window.innerHeight;
});

function toggleMenu(){
  const overlay=document.getElementById("menuOverlay");
  overlay.style.display = overlay.style.display==="flex" ? "none" : "flex";
}

// ESC menu toggle
document.addEventListener("keydown", e=>{
  if(e.key==="Escape"){
    const overlay=document.getElementById("menuOverlay");
    overlay.style.display = overlay.style.display==="flex" ? "none" : "flex";
  }
});

let active={};

async function ensureAudio(){
  if(ctx.state!=="running") await ctx.resume();
}

function toggle(type,on){
  if(on) start(type); else stop(type);
}

function stop(type){
  if(active[type]){
    active[type].forEach(n=>{
      try{n.stop&&n.stop();}catch{}
      try{n.disconnect&&n.disconnect();}catch{}
    });
    delete active[type];
  }
}

async function start(type){
  await ensureAudio();

  if(type==="pink"){
    const node=ctx.createScriptProcessor(4096,1,1);
    const gain=ctx.createGain();
    node.onaudioprocess=e=>{
      let out=e.outputBuffer.getChannelData(0);
      for(let i=0;i<out.length;i++) out[i]=(Math.random()*2-1)*0.2;
    };
    node.connect(gain).connect(master);

    function update(){
      if(!active["pink"]) return;
      gain.gain.value=0.05+(1-mouseY)*0.4;
      requestAnimationFrame(update);
    }

    active[type]=[node,gain];
    update();
  }

  if(type==="drone"){
    let osc=ctx.createOscillator();
    let gain=ctx.createGain();
    osc.type="sawtooth";
    osc.connect(gain).connect(master);
    osc.start();

    function update(){
      if(!active["drone"]) return;
      osc.frequency.value=80+mouseX*300;
      gain.gain.value=0.05+(1-mouseY)*0.3;
      requestAnimationFrame(update);
    }

    active[type]=[osc,gain];
    update();
  }

  if(type==="synth"){
    let osc=ctx.createOscillator();
    let gain=ctx.createGain();
    osc.type="square";
    osc.connect(gain).connect(master);
    osc.start();

    function update(){
      if(!active["synth"]) return;
      osc.frequency.value=200+mouseX*1000;
      gain.gain.value=0.05+(1-mouseY)*0.25;
      requestAnimationFrame(update);
    }

    active[type]=[osc,gain];
    update();
  }

  if(type==="glitch"){
    function burst(){
      if(!active["glitch"]) return;
      let osc=ctx.createOscillator();
      let gain=ctx.createGain();
      osc.type="square";
      osc.frequency.value=200+Math.random()*4000;
      gain.gain.value=0.15;
      osc.connect(gain).connect(master);
      osc.start();
      osc.stop(ctx.currentTime+0.05);
      setTimeout(burst, 60);
    }
    active[type]=[];
    burst();
  }

  if(type==="chirps"){
    function chirp(){
      if(!active["chirps"]) return;
      let osc=ctx.createOscillator();
      let gain=ctx.createGain();
      osc.type="triangle";
      osc.frequency.setValueAtTime(300+mouseY*2000,ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(2000+mouseX*2000,ctx.currentTime+0.1);
      gain.gain.value=0.1;
      osc.connect(gain).connect(master);
      osc.start();
      osc.stop(ctx.currentTime+0.1);
      setTimeout(chirp, 200);
    }
    active[type]=[];
    chirp();
  }
}


// Mute control
let muted=false;
const muteBtn=document.getElementById("muteButton");
muteBtn.onclick=()=>{
  muted=!muted;
  master.gain.value = muted ? 0 : 0.7;
  muteBtn.textContent = muted ? "Unmute" : "Mute";
};

// Recording timer
let recStartTime;
let recTimerInterval;

function startTimer(){
  recStartTime=Date.now();
  const timer=document.getElementById("recTimer");
  timer.style.display="block";
  recTimerInterval=setInterval(()=>{
    let t=Math.floor((Date.now()-recStartTime)/1000);
    let m=Math.floor(t/60).toString().padStart(2,"0");
    let s=(t%60).toString().padStart(2,"0");
    timer.textContent=`${m}:${s}`;
  },500);
}

function stopTimer(){
  clearInterval(recTimerInterval);
  document.getElementById("recTimer").style.display="none";
}

// Recording
let recData=[], recording=false, processor;
let dotInterval;

function toggleRecord(){
  if(!recording){
    recData=[];
    processor=ctx.createScriptProcessor(4096,1,1);
    analyser.connect(processor);
    processor.connect(ctx.destination);

    processor.onaudioprocess=e=>{
      let input=e.inputBuffer.getChannelData(0);
      recData.push(new Float32Array(input));
    };

    document.getElementById("recordIndicator").style.display="flex"; startTimer();

    let dots=document.getElementById("dots");
    dotInterval=setInterval(()=>{
      dots.textContent = dots.textContent.length<3 ? dots.textContent+"." : "";
    },500);

    recording=true;
    document.getElementById("recBtn").innerText="Stop Recording";
  }else{
    processor.disconnect();
    clearInterval(dotInterval);
    document.getElementById("recordIndicator").style.display="none"; stopTimer();
    exportWAV(recData);
    recording=false;
    document.getElementById("recBtn").innerText="Start Recording";
  }
}

function exportWAV(buffers){
  let length=0;
  buffers.forEach(b=>length+=b.length);
  let data=new Float32Array(length);
  let offset=0;
  buffers.forEach(b=>{ data.set(b,offset); offset+=b.length; });

  let buffer=new ArrayBuffer(44+data.length*2);
  let view=new DataView(buffer);

  function writeStr(o,s){for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));}

  writeStr(0,'RIFF');
  view.setUint32(4,36+data.length*2,true);
  writeStr(8,'WAVE');
  writeStr(12,'fmt ');
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,ctx.sampleRate,true);
  view.setUint32(28,ctx.sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  writeStr(36,'data');
  view.setUint32(40,data.length*2,true);

  let pos=44;
  for(let i=0;i<data.length;i++){
    let s=Math.max(-1,Math.min(1,data[i]));
    view.setInt16(pos,s<0?s*0x8000:s*0x7FFF,true);
    pos+=2;
  }

  let blob=new Blob([buffer],{type:'audio/wav'});
  let url=URL.createObjectURL(blob);
  let a=document.createElement("a");
  a.href=url;
  a.download="matrix_chaos.wav";
  a.click();
}

// Visualizer
const canvas=document.getElementById("viz");
const c=canvas.getContext("2d");
let dataArray=new Uint8Array(analyser.fftSize);

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.onresize=resize;
resize();

function draw(){
  requestAnimationFrame(draw);
  analyser.getByteTimeDomainData(dataArray);
  c.clearRect(0,0,canvas.width,canvas.height);
  c.strokeStyle="#00ff00";
  c.beginPath();
  let slice=canvas.width/dataArray.length;
  let x=0;
  for(let i=0;i<dataArray.length;i++){
    let v=dataArray[i]/128.0;
    let y=v*canvas.height/2;
    if(i===0)c.moveTo(x,y);
    else c.lineTo(x,y);
    x+=slice;
  }
  c.stroke();
}
draw();

</script>

</body>
</html>
