<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tektite's Sound Machine</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
color:#00ff00;
}

#topBar{
position:fixed;
top:0;
left:0;
width:100%;
height:48px;
background:black;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
box-sizing:border-box;
z-index:40;
}

#settingsButton{color:#00ff00;font-size:18px;cursor:pointer;}

#topTitle{
position:absolute;
left:50%;
transform:translateX(-50%);
color:#00ff00;
font-size:20px;
}

#menuOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
z-index:50;
}

#menuBox{
border:2px solid #00ff00;
padding:30px;
width:320px;
text-align:left;
background:rgba(0,255,0,0.25);
box-shadow:0 0 20px #00ff00;
}

label{
display:block;
margin:10px 0;
cursor:pointer;
}

button{
margin-top:15px;
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:8px 12px;
cursor:pointer;
}

#seedInput{
width:100%;
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:6px;
font-family:monospace;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

#muteButton{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:6px 16px;
cursor:pointer;
z-index:30;
}

</style>
</head>

<body>

<div id="topBar">
<div id="settingsButton" onclick="toggleMenu()">Esc = Settings</div>
<div id="topTitle">Tektite's Sound Machine</div>
</div>


<div id="menuOverlay">
<div id="menuBox">

<h3>CHAOS OPTIONS</h3>

<!-- NEW: procedural seed -->
<div style="margin-bottom:12px;">
<div style="font-size:12px;">Procedural Seed</div>
<input id="seedInput" placeholder="enter chaos seed">
</div>

<label><input type="checkbox" onchange="toggle('pink', this.checked)"> Pink Noise</label>
<label><input type="checkbox" onchange="toggle('drone', this.checked)"> Drone</label>
<label><input type="checkbox" onchange="toggle('synth', this.checked)"> Synth</label>
<label><input type="checkbox" onchange="toggle('glitch', this.checked)"> Glitch</label>
<label><input type="checkbox" onchange="toggle('chirps', this.checked)"> Chirps</label>

<button onclick="toggleRecord()" id="recBtn">Start Recording</button>

</div>
</div>

<canvas id="viz"></canvas>

<div id="muteButton">Mute</div>


<script>

/* ================================
AUDIO ENGINE
================================ */

const ctx = new (window.AudioContext||window.webkitAudioContext)();
const analyser = ctx.createAnalyser();
analyser.fftSize = 2048;

const master = ctx.createGain();
master.gain.value = 0.7;
master.connect(analyser).connect(ctx.destination);


/* ================================
SEEDED RANDOM
================================ */

let seed=1;

function setSeedFromInput(){

const txt=document.getElementById("seedInput").value;

seed=0;

for(let i=0;i<txt.length;i++){
seed=(seed<<5)-seed+txt.charCodeAt(i);
seed|=0;
}

generateMusicWorld();
generateChordProgression();

}

function seededRandom(){

seed=(seed*1664525+1013904223)%4294967296;
return seed/4294967296;

}

document.getElementById("seedInput").addEventListener("change",setSeedFromInput);


/* ================================
MUSIC THEORY
================================ */

const scales={
minor:[0,2,3,5,7,8,10],
major:[0,2,4,5,7,9,11],
dorian:[0,2,3,5,7,9,10],
pentatonic:[0,3,5,7,10]
};

let rootNote=48;
let activeScale=scales.minor;

function generateMusicWorld(){

const names=Object.keys(scales);
const idx=Math.floor(seededRandom()*names.length);

activeScale=scales[names[idx]];
rootNote=36+Math.floor(seededRandom()*24);

}


let chordProgression=[];
let chordIndex=0;

function generateChordProgression(){

chordProgression=[];

let len=4+Math.floor(seededRandom()*4);

for(let i=0;i<len;i++){

let degree=Math.floor(seededRandom()*activeScale.length);
chordProgression.push(degree);

}

}


setInterval(()=>{

chordIndex++;
if(chordIndex>=chordProgression.length) chordIndex=0;

},4000);


function midiToFreq(m){
return 440*Math.pow(2,(m-69)/12);
}

function getNote(){

if(chordProgression.length===0) return 220;

let degree=chordProgression[chordIndex];
let interval=activeScale[degree];

let octave=Math.floor(seededRandom()*2)*12;

let midi=rootNote+interval+octave;

return midiToFreq(midi);

}


/* ================================
MENU
================================ */

function toggleMenu(){

const overlay=document.getElementById("menuOverlay");
overlay.style.display = overlay.style.display==="flex" ? "none":"flex";

}

document.addEventListener("keydown",e=>{

if(e.key==="Escape") toggleMenu();

});


/* ================================
SOUND GENERATORS
================================ */

let active={};

async function ensureAudio(){
if(ctx.state!=="running") await ctx.resume();
}

function toggle(type,on){

if(on) start(type);
else stop(type);

}

function stop(type){

if(active[type]){

active[type].forEach(n=>{
try{n.stop&&n.stop();}catch{}
try{n.disconnect&&n.disconnect();}catch{}
});

delete active[type];

}

}

async function start(type){

await ensureAudio();

if(type==="drone"){

let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.type="sawtooth";
osc.connect(gain).connect(master);
osc.start();

function update(){

if(!active["drone"]) return;

osc.frequency.value=getNote();
gain.gain.value=0.2;

requestAnimationFrame(update);

}

active[type]=[osc,gain];
update();

}

if(type==="synth"){

let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.type="square";
osc.connect(gain).connect(master);
osc.start();

function update(){

if(!active["synth"]) return;

osc.frequency.value=getNote();
gain.gain.value=0.15;

requestAnimationFrame(update);

}

active[type]=[osc,gain];
update();

}

if(type==="glitch"){

function burst(){

if(!active["glitch"]) return;

let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.type="square";
osc.frequency.value=200+seededRandom()*4000;

gain.gain.value=0.15;

osc.connect(gain).connect(master);

osc.start();
osc.stop(ctx.currentTime+0.05);

setTimeout(burst,60);

}

active[type]=[];
burst();

}

if(type==="chirps"){

function chirp(){

if(!active["chirps"]) return;

let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.type="triangle";

osc.frequency.setValueAtTime(getNote(),ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(getNote()*2,ctx.currentTime+0.1);

gain.gain.value=0.1;

osc.connect(gain).connect(master);

osc.start();
osc.stop(ctx.currentTime+0.1);

setTimeout(chirp,200);

}

active[type]=[];
chirp();

}

}


/* ================================
MUTE
================================ */

let muted=false;

const muteBtn=document.getElementById("muteButton");

muteBtn.onclick=()=>{

muted=!muted;

master.gain.value=muted?0:0.7;
muteBtn.textContent=muted?"Unmute":"Mute";

};


/* ================================
VISUALIZER
================================ */

const canvas=document.getElementById("viz");
const c=canvas.getContext("2d");

let dataArray=new Uint8Array(analyser.fftSize);

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

window.onresize=resize;
resize();

function draw(){

requestAnimationFrame(draw);

analyser.getByteTimeDomainData(dataArray);

c.clearRect(0,0,canvas.width,canvas.height);

c.strokeStyle="#00ff00";
c.beginPath();

let slice=canvas.width/dataArray.length;
let x=0;

for(let i=0;i<dataArray.length;i++){

let v=dataArray[i]/128.0;
let y=v*canvas.height/2;

if(i===0)c.moveTo(x,y);
else c.lineTo(x,y);

x+=slice;

}

c.stroke();

}

draw();

</script>

</body>
</html>
