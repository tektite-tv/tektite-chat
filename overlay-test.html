<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

.topbar{
    height:60px;
    background:#3b0066;
    display:flex;
    align-items:center;
    padding-left:15px;
    padding-right:15px;
}

.hamburger{
    font-size:26px;
    cursor:pointer;
    user-select:none;
    color:lime;
    font-weight:bold;
}

.logo{
    margin-left:15px;
    height:40px;
}

.logo img{
    height:100%;
    width:auto;
    display:block;
}

.spacer{
    flex:1;
}

.clock iframe{
    display:block;
}

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:#1a1a1a;
    transition:left 0.25s;
    box-shadow:2px 0 10px rgba(0,0,0,0.6);
}

.sidebar.open{
    left:0;
}

.sidebar-menu{
    padding:20px;
}

/* container so preview can slide out */
.sidebar-item{
    position:relative;
    margin-bottom:12px;
}

.sidebar-menu a{
    display:block;
    background:lime;
    color:black;
    text-decoration:none;
    border:2px solid black;
    padding:10px;
    text-align:center;
    font-weight:bold;
    position:relative;
    z-index:2;
}

/* preview iframe */
.sidebar-preview{
    width:100%;
    aspect-ratio:16/9;
    overflow:hidden;
    transform:translateY(-100%);
    opacity:0;
    transition:transform 0.25s ease, opacity 0.25s ease;
}

/* iframe inside preview */
.sidebar-preview iframe{
    width:100%;
    height:100%;
    border:none;
}

/* hover effect */
.sidebar-item:hover .sidebar-preview{
    transform:translateY(0);
    opacity:1;
}

</style>
</head>

<body>

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

<div class="spacer"></div>

<div class="clock">
<iframe src="https://free.timeanddate.com/clock/iabiy632/n250/fn8/fs30/fc0f0/tct/pct/ftb/th2" frameborder="0" width="200" height="36" allowtransparency="true"></iframe>
</div>

</div>

<div id="sidebar" class="sidebar">

<div class="topbar">

<div class="hamburger" onclick="toggleSidebar()">✕</div>

<div class="logo">
<a href="/">
<img src="/images/deadlogo-green.png">
</a>
</div>

</div>

<div class="sidebar-menu">

<div class="sidebar-item">
<a href="/tektite-photosphere.html">Tektite's Photosphere</a>
<div class="sidebar-preview">
<iframe src="/"></iframe>
</div>
</div>

<div class="sidebar-item">
<a href="/tektite-image-editor.html">Tektite's Image Editor</a>
<div class="sidebar-preview">
<iframe src="/"></iframe>
</div>
</div>

<div class="sidebar-item">
<a href="/tektite-sound-machine.html">Tektite's Sound Machine</a>
<div class="sidebar-preview">
<iframe src="/"></iframe>
</div>
</div>

</div>

</div>

<script>
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("open");
}
</script>

</body>
</html>
